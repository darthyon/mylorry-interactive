<style>
html,body,#root{min-height:100%;margin:0}*,*::before,*::after{box-sizing:border-box}body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:#fff}.msr{font-family:'Material Symbols Rounded';font-style:normal;line-height:1;display:inline-flex;align-items:center}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.ovl-shell{display:grid;grid-template-columns:72px minmax(0,1fr);min-height:100vh;background:#fff}.ovl-rail-wrap{position:sticky;top:0;align-self:start;height:100vh;z-index:25}.ovl-rail{height:100%;width:72px;background:#fff;border-right:1px solid var(--border-light);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto}.ovl-rail.expanded{width:220px;align-items:stretch;box-shadow:4px 0 16px rgba(0,0,0,.08)}.ovl-rail-profile{display:flex;align-items:center;gap:4px;margin-bottom:12px;padding:6px 4px;border-radius:10px}.ovl-rail.expanded .ovl-rail-profile{gap:10px}.ovl-rail-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}.ovl-rail-avatar{width:32px;height:32px;border-radius:50%;background:rgb(223,234,239);display:flex;align-items:center;justify-content:center}.ovl-rail-badge{border-radius:12px;background:var(--gradient-brand);padding:1px 5px;font-size:6px;font-weight:700;color:#fff;line-height:1.6;letter-spacing:.5px;text-transform:uppercase}.ovl-rail-profile-text{display:flex;flex-direction:column;gap:2px;overflow:hidden;min-width:0}.ovl-rail-profile-role{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-tertiary)}.ovl-rail-profile-name{font-size:14px;font-weight:600;color:var(--fg-primary)}.ovl-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;padding:6px 2px;border:0;background:transparent;font:inherit;text-decoration:none}.ovl-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.15}.ovl-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary)}.ovl-rail-item.active{background:var(--green-50);color:var(--green-600)}.ovl-rail.expanded .ovl-rail-item{flex-direction:row;justify-content:flex-start;width:100%;padding:10px 8px;gap:10px}.ovl-rail.expanded .ovl-rail-item span:not(.msr){font-size:13px;text-align:left}.ovl-rail-divider{background:#f6f6f6;height:1px;width:100%;margin:8px 0}.ovl-rail-footer{display:flex;flex-direction:column;gap:2px;width:100%;margin-top:auto}.ovl-rail-signout{color:#d55f5a}.ovl-rail-toggle{position:absolute;top:34px;left:57px;width:28px;height:28px;border-radius:8px;background:#fff;border:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:26;box-shadow:0 2px 6px rgba(0,0,0,.06);color:var(--fg-secondary)}.ovl-rail-wrap.expanded .ovl-rail-toggle{left:205px}.ovl-main{min-width:0;background:#fff}.ovl-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light)}.ovl-topbar-spacer{flex:1}.ovl-content{padding:22px 24px 96px;margin:0}.odr-toast{position:fixed;right:20px;top:20px;z-index:20}.odr-modal-backdrop{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:rgba(16,25,21,.38)}.odr-modal{width:min(410px,calc(100vw - 28px));padding:22px;border-radius:12px;background:#fff;box-shadow:var(--shadow-md)}.odr-modal p{margin:8px 0 20px;color:var(--fg-secondary)}.odr-modal>div{display:flex;justify-content:flex-end;gap:9px}@media(max-width:1023px){.ovl-shell{grid-template-columns:1fr}.ovl-rail-wrap{position:fixed;top:auto;bottom:14px;left:50%;height:auto;transform:translateX(-50%);max-width:calc(100vw - 28px)}.ovl-rail{width:auto;height:auto;flex-direction:row;padding:6px;border:1px solid var(--border-light);border-radius:999px;background:rgba(255,25
