<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Org Dashboard — Revamp</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<style>
/* ── Reset ──────────────────────────────────────────────────── */
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:var(--bg-page,#F4F6F5);}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}

/* ── Shell ──────────────────────────────────────────────────── */
.od-shell{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}
.od-rail{position:sticky;top:0;align-self:start;height:100vh;background:#fff;border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;}
.od-rail::-webkit-scrollbar{width:0;}
.od-rail-logo{width:40px;height:40px;border-radius:12px;background:var(--gradient-brand);
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.od-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;}
.od-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.1;}
.od-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.od-rail-item.active{background:var(--green-50);color:var(--green-600);}

.od-main{min-width:0;}
.od-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light);}
.od-org{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 12px;border-radius:var(--radius-pill);
  background:var(--bg-dark,#2B2E33);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
.od-topbar-spacer{flex:1;}
.od-updated{font-size:12px;color:var(--fg-tertiary);}
.od-datepick{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border-medium);background:#fff;font-size:13px;color:var(--fg-primary);cursor:pointer;}
.od-iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-light);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);}

.od-content{padding:22px 24px 48px;max-width:1480px;margin:0 auto;}
.od-pagehead{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.od-pagetitle{font-size:22px;font-weight:700;color:var(--fg-primary);}
.od-planchip{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border-radius:var(--radius-pill);
  background:var(--green-50);color:var(--green-600);font-size:12px;font-weight:700;}
.od-welcome{font-size:13px;color:var(--fg-secondary);margin-bottom:18px;}

/* ── Card primitives ────────────────────────────────────────── */
.od-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px;}
.od-sec-title{font-size:15px;font-weight:700;color:var(--fg-primary);}
.od-sec-sub{font-size:12px;color:var(--fg-tertiary);}
.od-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--green-600);
  cursor:pointer;background:none;border:none;font-family:var(--font-sans);padding:0;}
.od-link:hover{text-decoration:underline;}

/* ── Section 1: Top Pulse ───────────────────────────────────── */
/* Balance is intentionally wider than the three stat cards. */
.od-pulse{display:grid;grid-template-columns:1.65fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px;align-items:stretch;}
.od-kpi{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;}

/* — Balance (wide card; gradient tone reflects balance health) — */
.od-kpi-balance{background:var(--gradient-balance-green);border:none;color:#fff;padding:20px;}
.od-kpi-balance.amber{background:var(--gradient-balance-amber);}
.od-kpi-balance.red{background:var(--gradient-balance-red);}
.od-bal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.od-bal-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.9);}
.od-bal-updated{font-size:11px;line-height:1.4;color:rgba(255,255,255,.78);text-align:right;}
.od-bal-value{font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-top:8px;}
.od-bal-pill{display:inline-flex;align-self:flex-start;align-items:center;gap:5px;margin-top:10px;font-size:12px;font-weight:600;color:rgba(255,255,255,.92);}
.od-bal-band{display:flex;margin-top:16px;border-radius:10px;background:rgba(0,0,0,.14);overflow:hidden;}
.od-bal-cell{flex:1;padding:11px 14px;}
.od-bal-cell + .od-bal-cell{border-left:1px solid rgba(0,0,0,.16);}
.od-bal-cell-l{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.82);}
.od-bal-cell-v{font-size:15px;font-weight:700;margin-top:3px;}
.od-bal-foot{margin-top:14px;display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;cursor:pointer;}

/* — Standard stat cards (operating cost / vehicles / drivers) — */
.od-kpi-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px;}
.od-kpi-id{display:flex;align-items:center;gap:11px;min-width:0;}
.od-kpi-ico{width:42px;height:42px;border-radius:12px;background:var(--green-50);display:flex;align-items:center;justify-content:center;color:var(--green-600);flex-shrink:0;}
.od-kpi-ico.ring{background:#fff;border:2px solid var(--green-500);border-radius:50%;}
.od-kpi-label{font-size:13px;font-weight:700;color:var(--fg-primary);}
.od-kpi-sub{font-size:11.5px;color:var(--fg-tertiary);margin-top:1px;}
.od-kpi-toplink{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;color:var(--green-600);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.od-kpi-value{font-size:26px;font-weight:800;letter-spacing:-.01em;line-height:1;}
.od-trend{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;margin-top:7px;}
.od-trend.up{color:var(--green-600);}.od-trend.down{color:var(--red-400);}
.od-kpi-line{display:flex;align-items:baseline;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--border-light);}
.od-kpi-line-l{font-size:12px;color:var(--fg-tertiary);}
.od-kpi-line-v{font-size:13px;font-weight:700;color:var(--fg-primary);}
.od-kpi-foot{margin-top:auto;padding-top:13px;font-size:12px;font-weight:600;color:var(--green-600);display:inline-flex;align-items:center;gap:4px;cursor:pointer;}

/* Vehicles / Drivers cards now use the shared CountCard
   (window.SharedShell.CountCard · .ml-statcard* in components.css). */

/* ── Section 2: Modules ─────────────────────────────────────── */
.od-modules{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.od-mod{display:flex;align-items:center;gap:10px;flex:1 1 180px;min-width:170px;padding:12px 14px;
  border:1px solid var(--border-light);border-radius:var(--radius-md);background:#fff;cursor:pointer;}
.od-mod:hover{border-color:var(--green-500);}
.od-mod-ico{width:34px;height:34px;border-radius:9px;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;color:var(--fg-secondary);flex-shrink:0;}
.od-mod.active .od-mod-ico{background:var(--green-50);color:var(--green-600);}
.od-mod-name{font-size:13px;font-weight:700;color:var(--fg-primary);flex:1;}
.od-mod.soon,.od-mod.locked{cursor:default;}
.od-mod.soon .od-mod-name,.od-mod.locked .od-mod-name{color:var(--fg-tertiary);}
.od-modtag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:var(--radius-pill);}
.od-modtag.active{background:var(--green-50);color:var(--green-600);}
.od-modtag.locked{background:var(--bg-muted);color:var(--fg-secondary);}
.od-modtag.soon{background:var(--bg-muted);color:var(--fg-tertiary);}

/* ── Section 3+4 row ────────────────────────────────────────── */
.od-row{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-top:16px;}

/* Trend */
.od-trend-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:14px;}
.od-chart{margin-top:20px;}
.od-chart-axislbl{font-size:11px;color:var(--fg-tertiary);margin-bottom:8px;}
.od-plotwrap{display:flex;gap:8px;}
.od-yaxis{display:flex;flex-direction:column;justify-content:space-between;height:200px;width:36px;
  font-size:10px;color:var(--fg-tertiary);text-align:right;padding-bottom:1px;}
.od-plot{flex:1;min-width:0;}
.od-bars{position:relative;display:flex;align-items:flex-end;gap:16px;height:200px;padding:0 4px;
  border-bottom:1px solid var(--border-medium);
  background-image:repeating-linear-gradient(to top,transparent,transparent 39.8px,var(--border-light) 39.8px,var(--border-light) 40px);}
.od-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;}
.od-bar-val{font-size:11px;font-weight:700;color:var(--fg-secondary);}
.od-bar{width:100%;max-width:40px;border-radius:5px 5px 0 0;background:var(--green-500);transition:height .3s;}
.od-bar.current{background:repeating-linear-gradient(45deg,#bfe9d2,#bfe9d2 5px,var(--green-400) 5px,var(--green-400) 10px);}
.od-xaxis{display:flex;gap:16px;padding:8px 4px 0;}
.od-xlbl{flex:1;font-size:10.5px;color:var(--fg-tertiary);text-align:center;white-space:nowrap;}
.od-hbars{display:flex;flex-direction:column;gap:12px;margin-top:18px;}
.od-hbar-row{display:grid;grid-template-columns:74px 1fr 70px;align-items:center;gap:10px;}
.od-hbar-lbl{font-size:12px;font-weight:600;color:var(--fg-primary);}
.od-hbar-track{height:18px;background:var(--bg-muted);border-radius:5px;overflow:hidden;}
.od-hbar-fill{height:100%;background:var(--green-500);border-radius:5px;}
.od-hbar-val{font-size:12px;font-weight:700;color:var(--fg-secondary);text-align:right;}
.od-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;align-items:center;}
.od-leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--fg-secondary);}
.od-leg-dot{width:10px;height:10px;border-radius:3px;}
.od-leg.soon{color:var(--fg-disabled);}
.od-chart-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap;}
.od-chart-hint{font-size:11.5px;color:var(--fg-tertiary);display:inline-flex;align-items:center;gap:5px;}

/* Trips Today */
.od-trips{display:flex;flex-direction:column;gap:14px;margin-top:14px;}
.od-donut-wrap{display:flex;align-items:center;gap:18px;}
.od-donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;}
.od-donut-inner{position:absolute;inset:14px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.od-donut-n{font-size:22px;font-weight:800;color:var(--fg-primary);}
.od-donut-l{font-size:11px;color:var(--fg-tertiary);}
.od-trips-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
.od-trip-stat{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.od-trip-k{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--fg-secondary);}
.od-trip-v{font-size:16px;font-weight:700;color:var(--fg-primary);}
.od-trips-actions{display:flex;gap:8px;}

/* ── Section 5: Action Needed ───────────────────────────────── */
.od-actneed{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px;}
.od-an{display:flex;align-items:center;gap:12px;padding:16px;background:#fff;border:1px solid var(--border-light);
  border-radius:var(--radius-lg);cursor:pointer;}
.od-an:hover{border-color:var(--border-medium);}
.od-an-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.od-an-ico.red{background:#FCEBEC;color:var(--red-400);}
.od-an-ico.amber{background:var(--amber-50);color:var(--amber-600);}
.od-an-ico.green{background:var(--green-50);color:var(--green-600);}
.od-an-n{font-size:22px;font-weight:800;color:var(--fg-primary);line-height:1;}
.od-an-l{font-size:12px;color:var(--fg-secondary);margin-top:3px;}
.od-an-chev{margin-left:auto;color:var(--fg-tertiary);}

/* ── Section 6: Action Preview ──────────────────────────────── */
.od-preview{margin-top:16px;}
.od-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-light);margin-top:8px;overflow-x:auto;}
.od-tab{appearance:none;border:none;background:none;font-family:var(--font-sans);font-size:13px;font-weight:600;
  color:var(--fg-tertiary);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.od-tab.active{color:var(--green-600);border-bottom-color:var(--green-600);}
.od-ptable{width:100%;border-collapse:separate;border-spacing:0;margin-top:6px;}
.od-ptable th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  color:var(--fg-tertiary);padding:10px 12px;border-bottom:1px solid var(--border-light);white-space:nowrap;}
.od-ptable td{font-size:13px;padding:12px;border-bottom:1px solid var(--border-light);vertical-align:middle;color:var(--fg-primary);}
.od-ptable tbody tr{cursor:pointer;}
.od-ptable tbody tr:hover{background:#FAFBFA;}
.od-ptable tbody tr:last-child td{border-bottom:none;}
.od-cat{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:var(--radius-pill);}
.od-cat.green{background:var(--green-50);color:var(--green-600);}
.od-cat.amber{background:var(--amber-50);color:var(--amber-600);}
.od-cat.red{background:#FCEBEC;color:var(--red-400);}
.od-amt{font-weight:700;color:var(--navy-800,#1f3a5f);white-space:nowrap;}
.od-rowact{color:var(--green-600);font-weight:600;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.od-emptyrow{text-align:center;color:var(--fg-tertiary);padding:34px 12px;font-size:13px;}

/* ── Empty state (generic) ──────────────────────────────────── */
.od-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:34px 16px;text-align:center;color:var(--fg-tertiary);}
.od-empty .msr{color:var(--border-strong,#c7cdcb);}
.od-empty-t{font-size:13px;font-weight:600;color:var(--fg-secondary);}
.od-empty-s{font-size:12px;color:var(--fg-tertiary);max-width:240px;}

/* ── Buttons (local) ────────────────────────────────────────── */
.od-btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 14px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.od-btn-primary{background:var(--green-600);color:#fff;}
.od-btn-primary:hover{background:#009945;}
.od-btn-outline{background:#fff;color:var(--fg-primary);border:1px solid var(--border-medium);}
.od-btn-outline:hover{background:var(--bg-muted);}

/* ── Responsive (mobile = same DOM, stacked; no reorder) ────── */
@media (max-width:1080px){
  .od-pulse{grid-template-columns:1fr 1fr;}
  .od-kpi-balance{grid-column:1 / -1;}
  .od-row{grid-template-columns:1fr;}
}
@media (max-width:680px){
  /* Left rail → floating bottom nav (Home / Organization / Account). */
  .od-shell{grid-template-columns:1fr;}
  .od-rail{position:fixed;left:50%;top:auto;bottom:16px;transform:translateX(-50%);z-index:60;
    width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;
    background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid var(--border-light);border-radius:var(--radius-pill);box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:visible;}
  .od-rail-logo{display:none;}
  .od-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);}
  .od-rail-item span:not(.msr){font-size:11px;}
  .od-rail-item:not(.active) span:not(.msr){display:none;}
  .od-rail-item.active{background:#fff;color:var(--green-600);}
  .od-pulse{grid-template-columns:1fr;}
  .od-kpi-balance{grid-column:auto;}
  .od-actneed{grid-template-columns:1fr;}
  .od-content{padding:16px 14px 96px;}  /* room for floating nav */
  .od-updated{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="../../shared/shared-shell.js?v=20260623"></script>
<script src="../../shared/tweaks-panel.js?v=20260623"></script>
<script src="data.js?v=20260623"></script>
<script src="app.js?v=20260623"></script>
<script>
  document.addEventListener('keydown', function(e){
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'e') {
      e.preventDefault();
      var panel = document.querySelector('[data-omelette-chrome]');
      if (panel) window.postMessage({ type: '__deactivate_edit_mode' }, '*');
      else window.postMessage({ type: '__activate_edit_mode' }, '*');
    }
  });
</script>
</body>
</html>
