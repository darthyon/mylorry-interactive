<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Org Dashboard — Revamp</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<style>
/* ── Reset ──────────────────────────────────────────────────── */
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:var(--bg-page,#F4F6F5);}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}

/* ── Shell ──────────────────────────────────────────────────── */
.od-shell{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}
.od-rail{position:sticky;top:0;align-self:start;height:100vh;background:#fff;border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;}
.od-rail::-webkit-scrollbar{width:0;}
.od-rail-logo{width:40px;height:40px;border-radius:12px;background:var(--gradient-brand);
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.od-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;text-decoration:none;}
.od-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.1;}
.od-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.od-rail-item.active{background:var(--green-50);color:var(--green-600);}

.od-main{min-width:0;}
.od-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light);}
/* Org switcher — GitHub-style subtle dropdown trigger */
.od-org-switcher{position:relative;display:inline-flex;align-items:center;}
.od-org-trigger{display:inline-flex;align-items:center;gap:8px;height:34px;padding:6px 10px;
  border-radius:8px;background:transparent;border:none;font-family:var(--font-sans);
  font-size:13px;font-weight:600;color:var(--fg-primary);cursor:pointer;transition:background .14s;}
.od-org-trigger:hover{background:var(--bg-muted);}
.od-org-avatar{width:24px;height:24px;border-radius:50%;background:var(--green-50);color:var(--green-600);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.od-org-name{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.od-org-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:30;min-width:260px;background:#fff;
  border:1px solid var(--border-light);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:8px 0;overflow:hidden;}
.od-org-menu-h{padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
  color:var(--fg-tertiary);}
.od-org-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:none;background:transparent;
  font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);cursor:pointer;text-align:left;transition:background .12s;}
.od-org-item:hover,.od-org-item.active{background:var(--green-50);}
.od-org-item-avatar{width:24px;height:24px;border-radius:50%;background:var(--green-50);color:var(--green-600);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.od-org-item-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.od-org-item-role{font-size:11px;color:var(--fg-tertiary);flex-shrink:0;}
.od-topbar-spacer{flex:1;}
.od-updated{font-size:12px;color:var(--fg-tertiary);}
.od-iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-light);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);}

.od-content{padding:22px 24px 48px;max-width:1480px;margin:0 auto;}
.od-pagehead{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.od-pagetitle{font-size:20px;font-weight:600;color:var(--fg-primary);}
.od-planchip{display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 10px;border-radius:var(--radius-pill);
  background:var(--green-50);color:var(--green-600);font-size:12px;font-weight:600;}
.od-welcome{font-size:13px;color:var(--fg-secondary);margin-bottom:18px;}

/* ── Card primitives ────────────────────────────────────────── */
.od-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px;}
.od-sec-title{font-size:15px;font-weight:600;color:var(--fg-primary);}
.od-sec-sub{font-size:12px;color:var(--fg-tertiary);}
.od-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--green-600);
  cursor:pointer;background:none;border:none;font-family:var(--font-sans);padding:0;}
.od-link:hover{text-decoration:underline;}

/* ── Section 1: Top Pulse ───────────────────────────────────── */
/* Balance is intentionally wider than the three stat cards. */
.od-pulse{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px;align-items:stretch;}
.od-kpi{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;cursor:pointer;transition:border-color .16s ease,box-shadow .16s ease;}
.od-kpi:hover{border-color:var(--border-medium);box-shadow:var(--shadow-card);}
.od-card-arrow{width:28px;height:28px;border:1px solid var(--border-light);border-radius:50%;background:var(--bg-surface);color:var(--green-600);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;}
.od-card-arrow:hover{border-color:var(--green-500);background:var(--green-50);}
.od-card-arrow.invert{border-color:rgba(255,255,255,.28);background:rgba(0,0,0,.12);color:#fff;}
.od-card-arrow.invert:hover{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.45);}

/* — Balance (wide card; gradient tone reflects balance health) — */
.od-kpi-balance{background:var(--gradient-balance-green);border:none;color:#fff;padding:14px 16px;position:relative;}
.od-kpi-balance.amber{background:var(--gradient-balance-amber);}
.od-kpi-balance.red{background:var(--gradient-balance-red);}
.od-kpi-balance.frozen{background:linear-gradient(145deg,#9CA3AF 0%,#6B7280 100%);}

/* — Edge nav arrows (hover-reveal, white + dark chevron) — */
.od-bal-warrow{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.45);border:none;color:#1a3a25;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;
  opacity:0;transition:opacity .18s,background .15s;backdrop-filter:blur(4px);}
.od-bal-warrow:hover{background:rgba(255,255,255,.72);}
.od-kpi-balance:hover .od-bal-warrow{opacity:1;}
.od-bal-wl{left:8px;}
.od-bal-wr{right:8px;}

/* — Desktop/mobile split — */
.od-bal-desktop{display:block;}
.od-bal-mobile{display:none;}

@media(max-width:640px){
  .od-kpi-balance{padding:0;overflow:visible;background:none !important;border:none;box-shadow:none !important;border-radius:0 !important;}
  .od-bal-desktop{display:none;}
  .od-bal-mobile{display:block;}
  .od-bal-mscroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:10px;padding:0 16px;}
  .od-bal-mscroll::-webkit-scrollbar{display:none;}
  .od-bal-mcard{flex-shrink:0;width:91%;scroll-snap-align:start;padding:14px 16px;border-radius:14px;color:#fff;background:var(--gradient-balance-green);}
  .od-bal-mcard.amber{background:var(--gradient-balance-amber);}
  .od-bal-mcard.red{background:var(--gradient-balance-red);}
  .od-bal-mcard.frozen{background:linear-gradient(145deg,#9CA3AF 0%,#6B7280 100%);}
  .od-bal-mcard-name{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#fff;}
}

/* — Top row: wallet name + last updated — */
.od-bal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.od-bal-wname{display:inline-flex;align-items:center;gap:5px;min-width:0;
  background:transparent;border:none;border-radius:5px;
  padding:2px 4px 2px 0;cursor:pointer;color:#fff;font:600 13px/1 var(--font-sans);
  transition:background .15s;}
.od-bal-wname:hover{background:rgba(255,255,255,.1);}
.od-bal-wname-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.od-bal-updated{font-size:11px;line-height:1.45;color:rgba(255,255,255,.78);text-align:right;flex-shrink:0;}
.od-bal-sublabel{font-size:11px;font-weight:600;color:rgba(255,255,255,.72);letter-spacing:.02em;}
.od-bal-sublabel-row{display:flex;align-items:center;gap:6px;margin-top:14px;}
.od-bal-sublabel-row .ml-tooltip-wrap:hover .ml-tooltip,
.od-bal-sublabel-row .ml-tooltip-wrap:focus-within .ml-tooltip{opacity:1;}
.od-bal-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.od-bal-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.32);border:0;padding:0;cursor:pointer;transition:background .15s,width .2s;}
.od-bal-dot.active{background:#fff;width:16px;border-radius:3px;}
.od-wallet-abbr{font-size:9.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.28);
  border-radius:3px;padding:1px 4px;flex-shrink:0;letter-spacing:.02em;}

/* — Wallet name wrapper (anchor for picker) — */
.od-bal-wname-wrap{position:relative;}

/* — Wallet picker dropdown / mobile bottom-sheet — */
.od-wallet-picker{position:absolute;top:calc(100% + 6px);left:0;width:260px;
  background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;
  box-shadow:0 4px 6px rgba(0,0,0,.08),0 12px 28px rgba(0,0,0,.16);z-index:30;overflow:hidden;}
.od-wallet-picker-h{font-size:11.5px;font-weight:600;color:var(--fg-tertiary);
  padding:11px 14px 9px;border-bottom:1px solid var(--border-light);}
.od-wallet-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;
  border:0;background:transparent;cursor:pointer;text-align:left;font-family:var(--font-sans);transition:background .12s;}
.od-wallet-item:hover,.od-wallet-item.active{background:var(--green-50);}
.od-wallet-item-check{width:16px;color:var(--green-600);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.od-wallet-item-logo{display:flex;align-items:center;flex-shrink:0;}
.od-wallet-item-logo .od-wallet-abbr{background:var(--green-100);color:var(--green-700);}
.od-wallet-item-name{font-size:13px;font-weight:500;color:var(--fg-primary);flex:1;text-align:left;}
.od-wallet-item.active .od-wallet-item-name{font-weight:600;color:var(--green-700);}
.od-wallet-item-bal{font-size:13px;font-weight:600;color:var(--fg-primary);white-space:nowrap;}
.od-wallet-item-tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:var(--radius-pill);}
.od-wallet-item-tag.low{background:#FEF3C7;color:#92400E;}
.od-wallet-item-tag.critical{background:#FEE2E2;color:#991B1B;}

.od-bal-unavail{font-size:14px;font-weight:500;opacity:.72;margin-top:12px;}
.od-bal-value{font-size:31px;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-top:3px;}
.od-bal-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
.od-bal-addcredit{background:#000;color:#fff;border:none;border-radius:8px;padding:8px 14px;
  font:600 13px var(--font-sans);cursor:pointer;flex-shrink:0;transition:background .15s;}
.od-bal-addcredit:hover{background:#1a1a1a;}
.od-bal-pill{display:inline-flex;align-self:flex-start;align-items:center;gap:5px;margin-top:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.92);}
.od-bal-band{display:flex;margin-top:12px;border-radius:9px;background:rgba(0,0,0,.14);overflow:hidden;}
.od-bal-cell{flex:1;padding:9px 12px;}
.od-bal-cell + .od-bal-cell{border-left:1px solid rgba(0,0,0,.16);}
.od-bal-cell-est{flex:.65;}
.od-bal-cell-l{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.82);}
.od-bal-cell-v{font-size:15px;font-weight:600;margin-top:3px;}
.od-bal-cell-s{font-size:11.5px;color:rgba(255,255,255,.78);margin-top:1px;}

@media(max-width:640px){
  .od-wallet-picker{position:fixed;top:auto;bottom:0;left:0;right:0;border-radius:16px 16px 0 0;max-height:60vh;overflow-y:auto;}
}

/* — Standard stat cards (operating cost / vehicles / drivers) — */
.od-pulse .ml-statcard{cursor:pointer;}

/* Operating Cost / Vehicles / Drivers now all use the shared CountCard
   (window.SharedShell.CountCard · .ml-statcard* in components.css).
   Operating Cost has no footer band — a 5-category breakdown won't fit the
   equal-cell band once every category has real data. Instead it's a plain
   2-per-row metadata grid (dot + label + value), small/quiet, muted for
   categories still "coming soon". */
.od-opcost-cats{display:grid;grid-template-columns:1fr 1fr;gap:6px 6px;margin-top:20px;
  background:var(--bg-subtle);border-radius:10px;padding:9px 10px;}
.od-opcost-cat{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
  color:var(--fg-secondary);min-width:0;white-space:nowrap;}
.od-opcost-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--green-500);}
.od-opcost-cat-sep{color:var(--fg-tertiary);}
.od-opcost-cat.soon{color:var(--fg-disabled);}
.od-opcost-cat.soon .od-opcost-cat-dot{background:#D6DAD8;}
/* Trend takes the place of the "Today" sub-label instead of its own line. */
.od-opcost-trend-sub{display:inline-flex;align-items:center;gap:3px;font-weight:600;}
.od-opcost-trend-sub.up{color:var(--green-600);}
.od-opcost-trend-sub.down{color:var(--red-400);}

/* Wrapper around the 3 CountCards: transparent on desktop (grid still sees
   4 flat items), becomes a horizontal scroller on mobile (see media query
   below), matching the wallet-card swipe pattern (.od-bal-mscroll). */
.od-statscroll{display:contents;}

/* ── Section 2: Modules ─────────────────────────────────────── */
.od-modrail-card{margin-top:16px;}
.od-modrail-head{display:flex;align-items:center;gap:8px;}
.od-modrail-head>span{font-size:12px;font-weight:500;color:var(--fg-tertiary);}
.od-modules{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-top:12px;}
.od-mod{appearance:none;border:0;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(20,29,24,.08);
  display:flex;align-items:center;gap:11px;min-width:0;padding:13px 14px;color:inherit;font-family:var(--font);text-align:left;cursor:pointer;
  transition:background .14s,box-shadow .14s,transform .14s;}
.od-mod.active:hover{box-shadow:0 4px 14px rgba(20,29,24,.12);transform:translateY(-1px);}
.od-mod-ico{width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.od-mod-ico img{display:block;max-width:100%;max-height:100%;object-fit:contain;}
.od-mod.soon .od-mod-ico,.od-mod.locked .od-mod-ico{filter:grayscale(1);opacity:.58;}
.od-mod-copy{display:flex;flex-direction:column;align-items:flex-start;gap:5px;min-width:0;flex:1;}
.od-mod-name{font-size:13px;font-weight:600;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.od-mod.soon,.od-mod.locked{cursor:default;}
.od-mod:disabled{cursor:default;opacity:1;}
.od-mod.soon,.od-mod.locked{box-shadow:0 1px 3px rgba(20,29,24,.05);}
.od-mod.soon .od-mod-name,.od-mod.locked .od-mod-name{color:var(--fg-tertiary);}
.od-mod.active>.msr{color:var(--green-600);opacity:0;transform:translateX(-3px);transition:opacity .14s,transform .14s;}
.od-mod.active:hover>.msr{opacity:1;transform:translateX(0);}
.od-modtag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;
  padding:2px 7px;border-radius:var(--radius-pill);}
.od-modtag.active{background:var(--green-50);color:var(--green-600);}
.od-modtag.locked{background:var(--bg-muted);color:var(--fg-secondary);}
.od-modtag.soon{background:var(--bg-muted);color:var(--fg-tertiary);}

/* ── Section 3: Trend + MyTrip ───────────────────────────────── */
.od-row{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-top:16px;align-items:stretch;}
.od-row>.od-card{min-width:0;}  /* grid items don't shrink below content's intrinsic width by default — this is what breaks responsiveness for the chart/MyTrip cards on narrow viewports */
.od-trend-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.od-trend-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.od-chart{margin-top:20px;}
.od-chart-axislbl{font-size:11px;color:var(--fg-tertiary);margin-bottom:8px;}
.od-plotwrap{display:flex;gap:8px;}
.od-yaxis{display:flex;flex-direction:column;justify-content:space-between;height:160px;width:36px;
  font-size:10px;color:var(--fg-tertiary);text-align:right;padding-bottom:1px;}
.od-plot{flex:1;min-width:0;}
.od-bars{position:relative;display:flex;align-items:flex-end;gap:16px;height:160px;padding:0 4px;
  border-bottom:1px solid var(--border-medium);
  background-image:repeating-linear-gradient(to top,transparent,transparent 31.8px,var(--border-light) 31.8px,var(--border-light) 32px);}
.od-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;justify-content:flex-end;height:100%;cursor:pointer;}
.od-bar-val{display:none;}
.od-bar-track{position:relative;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;border-radius:8px;transition:background .15s;}
.od-bar-track.active,.od-bar-col:hover .od-bar-track{background:rgba(0,0,0,.045);}
.od-bar{width:100%;max-width:40px;border-radius:5px 5px 0 0;background:var(--green-500);transition:height .3s,filter .15s;}
.od-bar.active,.od-bar-col:hover .od-bar{filter:brightness(.97);}
.od-bar.current{background:var(--green-400);}
.od-bar-tip,.od-hbar-tip{position:absolute;background:#fff;padding:9px 13px;border:1px solid var(--border-light);border-radius:10px;white-space:nowrap;z-index:5;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:left;}
.od-bar-tip{bottom:100%;left:50%;transform:translateX(-50%) translateY(-10px);}
.od-hbar-tip{bottom:100%;right:0;transform:translateY(-8px);}
.od-bar-tip-val{font-size:15px;font-weight:600;color:var(--green-600);line-height:1.15;}
.od-bar-tip-period{font-size:12px;font-weight:500;color:var(--fg-tertiary);margin-top:2px;}
.od-xaxis{display:flex;gap:16px;padding:8px 4px 0;}
.od-xlbl{flex:1;font-size:10.5px;color:var(--fg-tertiary);text-align:center;white-space:nowrap;}
.od-hbars-panel{min-height:236px;display:flex;flex-direction:column;gap:12px;}
.od-vehicle-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.od-vehicle-search{height:34px;min-width:0;width:240px;display:flex;align-items:center;gap:8px;padding:0 10px;border:1px solid var(--border-light);border-radius:7px;color:var(--fg-tertiary);background:var(--bg-card);transition:border-color .15s,box-shadow .15s;}
.od-vehicle-search:focus-within{border-color:var(--green-500);box-shadow:0 0 0 3px var(--green-50);}
.od-vehicle-search input{min-width:0;flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:12.5px;color:var(--fg-primary);}
.od-vehicle-search input::placeholder{color:var(--fg-disabled);}
.od-vehicle-search button,.od-vehicle-pagebtns button{border:0;background:transparent;color:var(--fg-tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;}
.od-vehicle-search button{width:22px;height:22px;margin-right:-5px;}
.od-vehicle-search button:hover,.od-vehicle-pagebtns button:not(:disabled):hover{background:var(--bg-muted);color:var(--fg-primary);}
.od-vehicle-count{font-size:11.5px;font-weight:500;color:var(--fg-tertiary);white-space:nowrap;}
.od-hbars{flex:1;display:flex;flex-direction:column;justify-content:space-between;gap:8px;}
.od-hbar-row{display:grid;grid-template-columns:74px 1fr 78px;align-items:center;gap:10px;cursor:pointer;min-height:25px;}
.od-hbar-lbl{font-size:12px;font-weight:600;color:var(--fg-primary);}
.od-hbar-track{position:relative;height:16px;background:var(--bg-muted);border-radius:5px;transition:background .15s;}
.od-hbar-track.active,.od-hbar-row:hover .od-hbar-track{background:#E7ECE9;}
.od-hbar-fill{height:100%;background:var(--green-500);border-radius:5px;transition:filter .15s;}
.od-hbar-fill.active,.od-hbar-row:hover .od-hbar-fill{filter:brightness(.97);}
.od-hbar-val{font-size:12px;font-weight:600;color:var(--fg-secondary);text-align:right;}
.od-hbar-empty{flex:1;display:flex;align-items:center;justify-content:center;min-height:146px;border:1px dashed var(--border-light);border-radius:8px;color:var(--fg-tertiary);font-size:13px;}
.od-vehicle-pager{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:11.5px;color:var(--fg-tertiary);}
.od-vehicle-pagebtns{display:flex;align-items:center;gap:4px;}
.od-vehicle-pagebtns button{width:26px;height:26px;border:1px solid var(--border-light);background:var(--bg-card);}
.od-vehicle-pagebtns button:disabled{opacity:.35;cursor:not-allowed;}
.od-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;align-items:center;}
.od-leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--fg-secondary);}
.od-leg-dot{width:10px;height:10px;border-radius:3px;}
.od-leg.soon{color:var(--fg-disabled);}

/* MyTrip */
.od-mytrip-card{min-height:100%;display:flex;flex-direction:column;}
.od-mytrip-card .ml-lock{flex:1;display:flex;}
.od-mytrip-card .ml-lock-content{width:100%;display:flex;flex-direction:column;}
.od-mytrip-head{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:0;background:none;border:none;font-family:inherit;cursor:pointer;}
.od-mytrip-head .od-sec-title{font-size:14px;font-weight:600;color:var(--fg-primary);}
.od-trips{margin-top:16px;display:flex;flex:1;align-items:stretch;}
.od-trips-body{display:flex;flex-direction:column;justify-content:flex-start;gap:16px;width:100%;min-height:100%;}
.od-trip-hero{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.od-trip-metric{display:flex;flex-direction:column;gap:8px;padding:14px;background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-md);}
.od-trip-metric-ico{width:32px;height:32px;border-radius:8px;background:var(--green-50);color:var(--green-600);display:flex;align-items:center;justify-content:center;}
.od-trip-metric-n{font-size:22px;font-weight:600;color:var(--navy-800);line-height:1;letter-spacing:-.02em;}
.od-trip-metric-l{font-size:12px;color:var(--fg-secondary);line-height:1;}
.od-trip-rows{display:flex;flex-direction:column;gap:12px;}
.od-trip-row{display:grid;grid-template-columns:90px minmax(60px,1fr) 70px;align-items:center;gap:8px;padding:4px 0;}
.od-trip-row-meta{display:flex;align-items:center;gap:6px;min-width:0;}
.od-trip-dot{width:7px;height:7px;border-radius:50%;background:var(--fg-tertiary);flex-shrink:0;}
.od-trip-row-l{font-size:13px;font-weight:500;color:var(--fg-primary);white-space:nowrap;}
.od-trip-row-bar{height:8px;background:var(--bg-muted);border-radius:999px;overflow:hidden;min-width:0;max-width:160px;}
.od-trip-row-fill{height:100%;border-radius:999px;background:var(--fg-tertiary);transition:width .3s ease;}
.od-trip-row-val{font-size:13px;font-weight:600;color:var(--fg-primary);white-space:nowrap;text-align:right;}
.od-trip-row.green .od-trip-dot,.od-trip-row.green .od-trip-row-fill{background:var(--green-500);}
.od-trip-row.teal .od-trip-dot,.od-trip-row.teal .od-trip-row-fill{background:var(--green-400);}
.od-trip-row.amber .od-trip-dot,.od-trip-row.amber .od-trip-row-fill{background:var(--amber-500);}
.od-trip-row.gray .od-trip-dot,.od-trip-row.gray .od-trip-row-fill{background:var(--fg-disabled);}

/* Fuel subsidy tooltip (kept near related components) */
.od-fuel-subsidy-track:hover::after,.od-fuel-subsidy-track:focus-visible::after{
  content:attr(data-tip);position:absolute;left:50%;bottom:100%;transform:translateX(-50%) translateY(-8px);
  background:#fff;border:1px solid var(--border-light);box-shadow:0 6px 18px rgba(0,0,0,.12);border-radius:9px;
  padding:7px 10px;font-size:11.5px;font-weight:500;color:var(--fg-primary);white-space:nowrap;z-index:8;pointer-events:none;
}

/* ── Section 5: Action Needed ───────────────────────────────── */
.od-overview{margin-top:16px;}
.od-actneed{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;}
.od-an{display:flex;flex-direction:column;gap:8px;padding:14px;background:#fff;
  border:1px solid var(--border-light);border-radius:var(--radius-md);
  box-shadow:0 1px 4px rgba(20,29,24,.08);cursor:pointer;text-align:left;
  appearance:none;font-family:var(--font-sans);
  transition:box-shadow .14s,transform .14s;}
.od-an:hover{box-shadow:0 4px 14px rgba(20,29,24,.12);transform:translateY(-1px);}
.od-an-ico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.od-an-ico.red{background:#FCEBEC;color:var(--red-400);}
.od-an-ico.amber{background:var(--amber-50);color:var(--amber-600);}
.od-an-ico.green{background:var(--green-50);color:var(--green-600);}
.od-an-label{font-size:12px;font-weight:500;color:var(--fg-secondary);line-height:1.2;flex:1;}
.od-an-count{display:flex;align-items:baseline;gap:5px;}
.od-an-n{font-size:22px;font-weight:700;color:var(--fg-primary);line-height:1;}
.od-an-sup{font-size:11.5px;color:var(--fg-tertiary);}
@media(max-width:640px){.od-actneed{grid-template-columns:repeat(2,1fr);}}

/* ── Section 6: Action Preview ──────────────────────────────── */
.od-preview{margin-top:16px;}
.od-preview-nav{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--border-light);}
.od-tabs{display:flex;gap:4px;overflow-x:auto;min-width:0;}
.od-tab{appearance:none;border:none;background:none;font-family:var(--font-sans);font-size:13px;font-weight:600;
  color:var(--fg-tertiary);padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.od-tab.active{color:var(--green-600);border-bottom-color:var(--green-600);}
.od-tab.locked{color:var(--fg-tertiary);opacity:.6;display:inline-flex;align-items:center;gap:5px;}
.od-tab-tier{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--bg-muted);color:var(--fg-tertiary);letter-spacing:.02em;margin-left:2px;}
.od-preview-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px;}
.od-preview-viewall{display:flex;justify-content:center;margin-top:14px;}
.od-preview-card{position:relative;border:1px solid var(--border-light);border-radius:var(--radius-md);background:#fff;
  transition:box-shadow .14s,transform .14s;cursor:pointer;}
.od-preview-card:hover{box-shadow:0 4px 14px rgba(20,29,24,.12);transform:translateY(-1px);}
.od-fuel-card{padding:14px 14px 12px;min-height:0;}
.od-fuel-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:11px;font-weight:500;color:var(--fg-tertiary);}
.od-provider-id{display:inline-flex;align-items:center;gap:6px;min-width:0;}
.od-provider-id .ml-petron-logo{border-radius:4px;flex-shrink:0;}
.od-provider-id-stack{display:flex;flex-direction:column;gap:1px;}
.od-provider-id-stack span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:600;color:var(--fg-secondary);}
.od-fuel-txnno{font-size:10px;font-weight:400;color:var(--fg-tertiary);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.od-fuel-primary{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:10px;}
.od-fuel-vehicle{font-size:17px;font-weight:700;line-height:1.1;color:var(--fg-primary);letter-spacing:-.01em;}
.od-fuel-amount{font-size:17px;font-weight:700;color:var(--navy-800);line-height:1.1;white-space:nowrap;}
.od-fuel-sign{color:var(--red-400);}
.od-fuel-secondary{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px;}
.od-fuel-location{font-size:12px;font-weight:400;color:var(--fg-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.od-fuel-volume{font-size:12px;font-weight:500;color:var(--fg-secondary);white-space:nowrap;flex-shrink:0;}
.od-fuel-subsidy{display:flex;align-items:center;gap:5px;margin-top:8px;}
.od-fuel-subsidy-lbl{font-size:11px;font-weight:500;color:var(--fg-tertiary);}
.od-fuel-subsidy-val{font-size:11.5px;font-weight:700;color:var(--green-600);}
.od-fuel-footer{display:flex;align-items:center;justify-content:space-between;margin:8px -14px -12px;padding:7px 14px;background:var(--bg-muted);border-top:1px solid var(--border-light);border-radius:0 0 var(--radius-md) var(--radius-md);}
.od-fuel-chev{color:var(--fg-tertiary);display:flex;align-items:center;}
.od-fuel-card-click{cursor:pointer;}
/* Modal */
.od-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.od-modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.od-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light);}
.od-modal-title{font-size:15px;font-weight:600;color:var(--fg-primary);}
.od-modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-light);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);}
.od-modal-close:hover{border-color:var(--border-medium);background:var(--bg-muted);}
.od-modal-hero{padding:20px 20px 16px;border-bottom:1px solid var(--border-light);text-align:center;}
.od-modal-txnid{font-size:11.5px;font-weight:500;color:var(--fg-tertiary);margin-bottom:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.od-modal-amount{font-size:28px;font-weight:700;color:var(--navy-800);line-height:1.1;}
.od-modal-meta{font-size:12.5px;color:var(--fg-secondary);margin-top:4px;}
.od-modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:0;}
.od-modal-section{padding:12px 0;border-bottom:1px solid var(--border-light);}
.od-modal-section:last-child{border-bottom:none;}
.od-modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:12px;}
.od-modal-row:last-child{margin-bottom:0;}
.od-modal-lbl{font-size:10.5px;font-weight:600;color:var(--fg-tertiary);margin-bottom:3px;}
.od-modal-val{font-size:13.5px;font-weight:500;color:var(--fg-primary);}
.od-modal-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.od-modal-amount{font-size:13.5px;font-weight:700;color:var(--navy-800);}
.od-modal-tag{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;font-size:10.5px;font-weight:700;background:var(--green-50);color:var(--green-700);margin-left:4px;}
.od-action-card{display:grid;grid-template-columns:40px minmax(0,1fr) auto;align-items:center;gap:12px;padding:14px;}
.od-action-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg-muted);color:var(--fg-tertiary);flex-shrink:0;}
.od-action-icon.green{background:var(--green-50);color:var(--green-600);}
.od-action-icon.amber{background:var(--amber-50);color:var(--amber-600);}
.od-action-icon.red{background:#FCEBEC;color:var(--red-400);}
.od-action-copy{min-width:0;}
.od-action-meta{font-size:11.5px;font-weight:600;color:var(--fg-tertiary);}
.od-action-title{font-size:15px;font-weight:600;color:var(--fg-primary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.od-action-sub{font-size:12.5px;font-weight:600;color:var(--fg-secondary);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.od-action-detail{font-size:12.5px;color:var(--fg-secondary);margin-top:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.od-action-side{display:flex;align-items:center;gap:10px;color:var(--fg-tertiary);}
.od-cat{display:inline-flex;align-items:center;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:var(--radius-pill);}
.od-cat.green{background:var(--green-50);color:var(--green-600);}
.od-cat.amber{background:var(--amber-50);color:var(--amber-600);}
.od-cat.red{background:#FCEBEC;color:var(--red-400);}
.od-emptyrow{text-align:center;color:var(--fg-tertiary);padding:34px 12px;font-size:13px;}
.od-shell .ml-btn-primary,.od-shell .ml-btn-soft,.od-shell .ml-lock-badge,.od-shell .ml-lock-cta{font-weight:600;}

/* ── Empty state (generic) ──────────────────────────────────── */
.od-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  padding:34px 16px;text-align:center;color:var(--fg-tertiary);}
.od-empty .msr{color:var(--border-strong,#c7cdcb);}
.od-empty-t{font-size:13px;font-weight:600;color:var(--fg-secondary);}
.od-empty-s{font-size:12px;color:var(--fg-tertiary);max-width:240px;}

/* ── Buttons (local) ────────────────────────────────────────── */
.od-btn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:0 14px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font-sans);white-space:nowrap;}
.od-btn-primary{background:var(--green-600);color:#fff;}
.od-btn-primary:hover{background:#009945;}
.od-btn-outline{background:#fff;color:var(--fg-primary);border:1px solid var(--border-medium);}
.od-btn-outline:hover{background:var(--bg-muted);}

/* ── Responsive (mobile = same DOM, stacked; no reorder) ────── */
@media (max-width:1080px){
  .od-pulse{grid-template-columns:1fr 1fr;}
  .od-kpi-balance{grid-column:1 / -1;}
  .od-row{grid-template-columns:1fr;}
  .od-preview-list{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media (max-width:680px){
  /* Left rail → floating bottom nav (Home / Organization / Account). */
  .od-shell{grid-template-columns:1fr;}
  .od-rail{position:fixed;left:50%;top:auto;bottom:16px;transform:translateX(-50%);z-index:60;
    width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;
    background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    border:1px solid var(--border-light);border-radius:var(--radius-pill);box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:visible;}
  .od-rail-logo{display:none;}
  .od-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);}
  .od-rail-item span:not(.msr){font-size:11px;}
  .od-rail-item:not(.active) span:not(.msr){display:none;}
  .od-rail-item.active{background:#fff;color:var(--green-600);}
  /* Mobile: Modules sit directly under Balance (nav-first on phones).
     od-content becomes a flex column; od-pulse dissolves via
     display:contents so its KPI cards join the flex flow and can be
     reordered independently. Uniform 16px gap replaces section margins. */
  .od-pagehead,.od-welcome{margin-bottom:0;}
  .od-modrail-card,.od-row,.od-overview,.od-preview{margin-top:0;}
  .od-pulse{display:contents;}
  .od-kpi-balance{order:1;}
  .od-modrail-card{order:2;}
  .od-statscroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:12px;padding:0 16px 2px;scroll-padding-inline:16px;order:3;}
  .od-statscroll::-webkit-scrollbar{display:none;}
  .od-statscroll>*{flex-shrink:0;width:86%;max-width:340px;scroll-snap-align:start;}
  .od-row{order:4;}
  .od-overview{order:5;}
  .od-preview{order:6;}
  /* Modules → 3-per-row grid (no carousel); vertical card layout. */
  .od-modules{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;overflow:visible;scroll-snap-type:none;margin:0;padding:0;}
  .od-mod{flex-direction:column;align-items:flex-start;gap:6px;padding:12px 10px;flex:initial;scroll-snap-align:none;width:auto;}
  .od-mod-ico{width:34px;height:34px;}
  .od-mod-name{font-size:12px;white-space:normal;line-height:1.2;}
  .od-modtag{font-size:9.5px;}
  .od-mod.active > .msr{display:none;}
  /* Mobile display-type scale (body labels stay at desktop size). */
  .od-pagetitle{font-size:16px;}
  .od-sec-title{font-size:14px;}
  .od-bal-value{font-size:30px;}
  .od-bal-cell-v{font-size:13px;}
  /* CountCards (Operating Cost / Vehicles / Drivers) — compact on mobile. */
  .od-shell .ml-statcard{padding:12px;}
  .od-shell .ml-statcard-ico{width:32px;height:32px;border-radius:9px;}
  .od-shell .ml-statcard-count{font-size:22px;}
  .od-shell .ml-statcard-labelrow{margin-top:8px;gap:1px;}
  .od-shell .ml-statcard-label{font-size:13px;}
  .od-shell .ml-statcard-sub{font-size:10.5px;}
  .od-shell .ml-statcard-trend{font-size:11px;margin-top:4px;}
  .od-shell .ml-statcard-action{width:24px;height:24px;}
  .od-shell .ml-statcard-band{margin:10px -12px -12px;padding:10px 12px;gap:12px;}
  .od-shell .ml-statcard-n{font-size:15px;}
  .od-shell .ml-statcard-l{font-size:10px;margin-top:2px;}
  .od-trip-hero{grid-template-columns:1fr;gap:10px;}
  .od-trip-metric{padding:12px;gap:6px;}
  .od-trip-metric-ico{width:28px;height:28px;border-radius:6px;}
  .od-trip-metric-n{font-size:20px;}
  .od-trip-metric-l{font-size:11px;}
  .od-trip-rows{gap:8px;}
  .od-trip-row{grid-template-columns:78px minmax(50px,1fr) 64px;gap:6px;padding:4px 0;}
  .od-trip-row-l{font-size:12px;}
  .od-trip-row-val{font-size:12px;}
  .od-trip-row-bar{height:5px;max-width:120px;}
  .od-fuel-vehicle{font-size:14px;}
  .od-action-title{font-size:14px;}
  .od-bar-tip-val{font-size:13px;}
  .od-preview-list{grid-template-columns:1fr;}
  .od-action-card{grid-template-columns:40px minmax(0,1fr);}
  .od-action-side{grid-column:2;justify-content:space-between;}
  .od-fuel-card{padding-right:34px;}
  .od-fuel-main{flex-direction:column;gap:8px;}
  .od-fuel-amounts{text-align:left;}
  .od-actneed{gap:8px;}
  .od-an{padding:10px 8px;gap:4px;}
  .od-an-ico{width:28px;height:28px;border-radius:7px;}
  .od-an-n{font-size:17px;}
  .od-an-l{font-size:10px;}
  .od-hide-sm{display:none;}
  .od-trend-controls{flex-wrap:wrap;gap:8px;}
  .od-trend-controls>div:first-child{width:100%;}
  .od-trend-actions{flex-wrap:nowrap;gap:6px;}
  .od-chart{margin-top:14px;}
  .od-chart-axislbl{font-size:10px;margin-bottom:6px;}
  .od-yaxis{width:26px;height:160px;font-size:9px;}
  .od-plotwrap{gap:5px;}
  .od-bars{gap:6px;height:160px;padding:0 2px;
    background-image:repeating-linear-gradient(to top,transparent,transparent 31.8px,var(--border-light) 31.8px,var(--border-light) 32px);}
  .od-bar{max-width:22px;}
  .od-xaxis{gap:6px;padding:6px 2px 0;}
  .od-xlbl{font-size:9px;}
  .od-trips-actions{padding-top:12px;}
  .od-trips-actions .ml-btn-primary{height:32px;font-size:11.5px;}
  .od-content{display:flex;flex-direction:column;gap:16px;padding:16px 14px 96px;}  /* room for floating nav */
  .od-updated{display:none;}
  .od-org-name{max-width:160px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="../../shared/shared-shell.js?v=20260630v"></script>
<script src="../../shared/tweaks-panel.js?v=20260630v"></script>
<script src="data.js?v=20260630v"></script>
<script src="app.js?v=20260630v"></script>
<script>
  document.addEventListener('keydown', function(e){
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'e') {
      e.preventDefault();
      var panel = document.querySelector('[data-omelette-chrome]');
      if (panel) window.postMessage({ type: '__deactivate_edit_mode' }, '*');
      else window.postMessage({ type: '__activate_edit_mode' }, '*');
    }
  });
</script>
</body>
</html>
