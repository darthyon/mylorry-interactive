<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Organisation Profile</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<style>
/* ── Reset ──────────────────────────────────────────────────── */
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:var(--bg-muted);}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}
/* --bg-page is #FFFFFF in tokens.css (not gray) — using it here would put
   white cards on a white page with only a 1px border for separation. Using
   --bg-muted (#F5F5F5) instead gives the elevated-card-on-gray-canvas look
   the Figma reference has. Card elevation scoped to this flow for now (not
   promoted to the shared .ml-card globally without sign-off, since that'd
   touch every flow); uses the existing --shadow-card token. */
.od-shell{background:var(--bg-muted);}
.od-shell .ml-card{box-shadow:var(--shadow-card);}

/* ── Shell (same rail/shell convention as org-dashboard) ──────── */
.od-shell{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}
.od-rail{position:sticky;top:0;align-self:start;height:100vh;background:#fff;border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;}
.od-rail::-webkit-scrollbar{width:0;}
.od-rail-logo{width:40px;height:40px;border-radius:12px;background:var(--gradient-brand);
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.od-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;text-decoration:none;}
.od-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.1;}
.od-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.od-rail-item.active{background:var(--green-50);color:var(--green-600);}
.od-main{min-width:0;}
/* Topbar — same chrome as org-dashboard's, so this page doesn't feel like
   it dropped out of the Org Portal shell. Uses the shared OrgSwitcher
   (window.SharedShell.OrgSwitcher, CSS in components.css) with a single-
   item orgs list — renders the avatar+name trigger without a switch
   dropdown, since there's nothing else to switch to on this page. */
.od-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light);}
.od-topbar-spacer{flex:1;}
.od-iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-light);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);}
.od-content{padding:22px 24px 48px;margin:0 auto;}
.od-pagehead{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.od-pagetitle{font-size:20px;font-weight:600;color:var(--fg-primary);}
.od-welcome{font-size:13px;color:var(--fg-secondary);margin-bottom:18px;}

/* ── Mobile-first: rail is a floating bottom nav by default ──── */
.od-shell{grid-template-columns:1fr;}
.od-rail{position:fixed;left:50%;top:auto;bottom:16px;transform:translateX(-50%);z-index:60;
  width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;
  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  border:1px solid var(--border-light);border-radius:var(--radius-pill);box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:visible;}
.od-rail-logo{display:none;}
.od-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);}
.od-rail-item span:not(.msr){font-size:11px;}
.od-rail-item:not(.active) span:not(.msr){display:none;}
.od-rail-item.active{background:#fff;color:var(--green-600);}
.od-content{display:flex;flex-direction:column;padding:16px 14px 96px;}
.od-pagehead{margin-bottom:16px;}
.od-welcome{margin-bottom:0;}
.od-pagetitle{font-size:16px;}
.od-topbar{padding:10px 14px;}
.od-org-name{max-width:160px;}

/* Section rhythm — explicit margins (not flex gap, which display:block at
   desktop silently discards) so spacing survives both breakpoints and can
   vary intentionally rather than reading as one flat repeated gap. */
.od-welcome{margin-bottom:18px;}
.osp-details-row{margin-bottom:16px;}
.osp-summary{margin-bottom:0;}

/* ── Subscription Summary (Services now lives inside this same card as a
   subsection — one card, not two, per feedback). Layout matches Figma node
   8756:37: underline tabs (not a Segmented pill), three parallel bordered
   stat-cards (Plan | Billing | Vehicles) rather than a header row + divider
   + 2-col grid. ────────────────────────────────────────────────────────── */
.osp-summary-title{font-size:15px;font-weight:700;color:var(--fg-primary);margin-bottom:18px;}
/* Current/Upcoming tabs reuse the shared .ml-tabs/.ml-tab (components.css) —
   same component commission-host uses, not a bespoke tab implementation. */
.osp-summary .ml-tabs{margin-bottom:16px;}

.osp-stats-panel{display:flex;flex-wrap:wrap;gap:16px;}
.osp-stat-card{flex:1 1 260px;min-width:0;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px 20px;}
.osp-stat-card-relative{position:relative;}
.osp-stat-card-relative .osp-block-title{padding-right:112px;}
.osp-calc-corner{position:absolute;top:14px;right:16px;}
.osp-plan-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.osp-plan-name{font-size:19px;font-weight:700;color:var(--fg-primary);}
.osp-plan-date{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--fg-secondary);margin-top:8px;}
.osp-upgrade-btn{margin-top:18px;}
.osp-block-title{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--fg-secondary);margin-bottom:8px;}
.osp-usage-text{font-size:22px;font-weight:700;color:var(--fg-primary);}
.osp-usage-track{height:8px;background:var(--bg-muted);border-radius:999px;overflow:hidden;margin-top:8px;}
.osp-usage-fill{height:100%;background:var(--green-500);border-radius:999px;transition:width .3s ease;}
.osp-usage-fill.full{background:var(--amber-500);}
.osp-slots-available{font-size:12px;color:var(--fg-tertiary);margin-top:8px;}
/* Compact empty state for a single stat-card — smaller than the full-size
   .osp-empty (icon+title+sub+CTA), no CTA needed here since the Plan card's
   own Upgrade button already covers that action. */
.osp-stat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:14px 0;}
.osp-stat-empty-t{font-size:12.5px;font-weight:500;color:var(--fg-tertiary);}
.osp-billing-amount{font-size:22px;font-weight:700;color:var(--fg-primary);margin-bottom:8px;}
.osp-billing-formula{font-size:11.5px;color:var(--fg-tertiary);}
.osp-billing-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--fg-secondary);margin-top:8px;}
.osp-billing-row strong{color:var(--fg-primary);font-weight:600;}
/* "Current billed amount" info trigger is now window.SharedShell.CalcPopover
   (click popover), CSS in components.css (.ml-calc-*) — not a hover tooltip. */

/* ── Organisation details ─────────────────────────────────────── */
.osp-details-row{display:flex;flex-direction:column;gap:14px;}
.osp-details-row .hac-dcard-title{margin-bottom:16px;}
.osp-org-grid{grid-template-columns:1fr 1fr;}
.osp-pic-row{display:flex;align-items:flex-start;gap:12px;}
.osp-pic-avatar{width:48px;height:48px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.osp-pic-name{font-size:14px;font-weight:600;color:var(--fg-primary);margin-bottom:6px;}
.osp-pic-meta{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--fg-secondary);margin-top:4px;}

/* ── Subscription Summary: empty state (Upcoming, nothing scheduled) ── */
/* Matches org-dashboard's .od-empty pattern (icon + title + sub), plus a CTA. */
.osp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 16px;text-align:center;color:var(--fg-tertiary);}
.osp-empty .msr{color:var(--border-strong,#c7cdcb);}
.osp-empty-t{font-size:13px;font-weight:600;color:var(--fg-secondary);}
.osp-empty-s{font-size:12px;color:var(--fg-tertiary);max-width:260px;}
.osp-empty .ml-btn-primary{margin-top:4px;}

/* ── Services — subsection inside the same Subscription Summary card.
   Tab shell is shared: window.SharedShell.FeatureTabShell, CSS in
   components.css (.ml-modtabs-*). Only panel-content styling for this
   flow's read-only rows stays local below. ──────────────────────────── */
.osp-services-sub{margin-top:28px;padding-top:24px;border-top:1px solid var(--border-light);display:flex;flex-direction:column;gap:14px;}
.osp-services-title{font-size:15px;font-weight:700;color:var(--fg-primary);}
.osp-svc-panel-head{margin-bottom:14px;}
.osp-module-name{font-size:15px;font-weight:700;color:var(--fg-primary);}
.osp-module-summary{font-size:12px;color:var(--fg-tertiary);margin-top:3px;}
.osp-module-note{display:inline-flex;align-items:center;margin-top:2px;padding:6px 9px;border-radius:6px;background:var(--bg-subtle);color:var(--fg-secondary);font-size:12px;line-height:1.35;}
.osp-module-body{display:flex;flex-direction:column;gap:12px;padding-top:12px;border-top:1px solid var(--border-light);}
.osp-feature-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;}
.osp-feature-label{color:var(--fg-primary);}
.osp-feature-cap{font-size:12.5px;font-weight:600;color:var(--fg-secondary);}
.osp-feature-state{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
.osp-feature-upgrade{font-size:11.5px;font-weight:600;color:var(--green-600);text-decoration:none;}
.osp-feature-upgrade:hover{text-decoration:underline;}

/* ── Desktop (≥1024px): rail back to a left sidebar, grids widen ── */
@media (min-width:1024px){
  .od-shell{grid-template-columns:72px 1fr;}
  .od-rail{position:sticky;top:0;left:auto;bottom:auto;transform:none;z-index:20;
    width:auto;height:100vh;flex-direction:column;gap:4px;padding:14px 6px;
    background:#fff;border:none;border-right:1px solid var(--border-light);border-radius:0;box-shadow:none;overflow-y:auto;}
  .od-rail-logo{display:flex;}
  .od-rail-item{min-height:54px;width:60px;flex-direction:column;gap:3px;padding:0;border-radius:10px;}
  .od-rail-item span:not(.msr){font-size:8.5px;}
  .od-rail-item:not(.active) span:not(.msr){display:block;}
  .od-content{display:block;padding:22px 24px 48px;}
  .od-pagehead{margin-bottom:20px;}
  .od-pagetitle{font-size:20px;}
  .osp-details-row{flex-direction:row;align-items:stretch;}
  .osp-details-row>.ml-card:first-child{flex:1.6;}
  .osp-details-row>.ml-card:last-child{flex:1;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="../../shared/shared-shell.js?v=20260715a"></script>
<script src="../../shared/tweaks-panel.js?v=20260708zz"></script>
<script src="../org-dashboard/data.js?v=20260709p"></script>
<script src="../host-subscription/data.js?v=20260709p"></script>
<script src="data.js?v=20260709p"></script>
<script src="app.js?v=20260709p"></script>
<script>
  document.addEventListener('keydown', function(e){
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'e') {
      e.preventDefault();
      var panel = document.querySelector('[data-omelette-chrome]');
      if (panel) window.postMessage({ type: '__deactivate_edit_mode' }, '*');
      else window.postMessage({ type: '__activate_edit_mode' }, '*');
    }
  });
</script>
</body>
</html>
