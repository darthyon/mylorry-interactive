<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyFuel Dashboard — Org Portal</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<style>
/* ── Reset / base ───────────────────────────────────────────── */
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:var(--bg-page,#F4F6F5);}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}

/* ── Shell ──────────────────────────────────────────────────── */
.mfd-shell{display:grid;grid-template-columns:72px 1fr;min-height:100vh;}
.mfd-rail{position:sticky;top:0;align-self:start;height:100vh;background:#fff;border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;text-decoration:none;}
.mfd-rail::-webkit-scrollbar{width:0;}
.mfd-rail-logo{width:40px;height:40px;border-radius:12px;background:var(--gradient-brand);
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.mfd-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;text-decoration:none;}
.mfd-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.1;}
.mfd-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.mfd-rail-item.active{background:var(--green-50);color:var(--green-600);}

.mfd-main{min-width:0;}
.mfd-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light);}

/* Org switcher */
.mfd-org-switcher{position:relative;display:inline-flex;align-items:center;}
.mfd-org-trigger{display:inline-flex;align-items:center;gap:8px;height:34px;padding:6px 10px;
  border-radius:8px;background:transparent;border:none;font-family:var(--font-sans);
  font-size:13px;font-weight:600;color:var(--fg-primary);cursor:pointer;transition:background .14s;}
.mfd-org-trigger:hover{background:var(--bg-muted);}
.mfd-org-avatar{width:24px;height:24px;border-radius:50%;background:var(--green-50);color:var(--green-600);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.mfd-org-name{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mfd-org-menu{position:absolute;top:calc(100% + 6px);left:0;z-index:30;min-width:260px;background:#fff;
  border:1px solid var(--border-light);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:8px 0;overflow:hidden;}
.mfd-org-menu-h{padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--fg-tertiary);}
.mfd-org-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border:none;background:transparent;
  font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);cursor:pointer;text-align:left;transition:background .12s;}
.mfd-org-item:hover,.mfd-org-item.active{background:var(--green-50);}
.mfd-org-item-avatar{width:24px;height:24px;border-radius:50%;background:var(--green-50);color:var(--green-600);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.mfd-org-item-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mfd-org-item-role{font-size:11px;color:var(--fg-tertiary);flex-shrink:0;}
.mfd-topbar-spacer{flex:1;}
.mfd-updated{font-size:12px;color:var(--fg-tertiary);}
.mfd-iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-light);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);}

.mfd-content{padding:22px 24px 48px;max-width:1480px;margin:0 auto;}

/* ── Page header ─────────────────────────────────────────────── */
.mfd-pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
.mfd-title{font-size:20px;font-weight:600;color:var(--fg-primary);margin:0 0 2px;}
.mfd-breadcrumb{font-size:12px;color:var(--fg-secondary);}

/* ── Shared card primitives ──────────────────────────────────── */
.mfd-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px;}
.mfd-cardhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.mfd-cardhead-title{font-size:15px;font-weight:600;color:var(--fg-primary);}
.mfd-cardhead-sub{font-size:12px;color:var(--fg-tertiary);margin-top:2px;}
.mfd-cardhead-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mfd-card-arrow{width:28px;height:28px;border:1px solid var(--border-light);border-radius:50%;background:var(--bg-surface);color:var(--green-600);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;}
.mfd-card-arrow:hover{border-color:var(--green-500);background:var(--green-50);}
.mfd-card-arrow.invert{border-color:rgba(255,255,255,.28);background:rgba(0,0,0,.12);color:#fff;}
.mfd-card-arrow.invert:hover{background:rgba(0,0,0,.2);}
.mfd-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--green-600);cursor:pointer;background:none;border:none;font-family:var(--font-sans);padding:0;}
.mfd-link:hover{text-decoration:underline;}

/* ── Section 1: Fuel Pulse ───────────────────────────────────── */
/* Balance is intentionally wider than the three stat cards (mirrors org-dashboard od-pulse). */
.mfd-pulse{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px;align-items:stretch;}
.mfd-kpi{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;cursor:pointer;transition:border-color .16s ease,box-shadow .16s ease;}
.mfd-kpi:hover{border-color:var(--border-medium);box-shadow:var(--shadow-card);}
/* Wraps the 3 CountCards so mobile can turn them into one horizontal
   scroller without touching the desktop grid (display:contents on desktop
   keeps mfd-pulse seeing 4 flat grid items). */
.mfd-statscroll{display:contents;}

/* Balance card */
.mfd-balance{background:var(--gradient-balance-green);border:none;color:#fff;position:relative;}
.mfd-balance.amber{background:var(--gradient-balance-amber);}
.mfd-balance.red{background:var(--gradient-balance-red);}

/* — Edge nav arrows (hover-reveal, white + dark chevron) — */
.mfd-bal-warrow{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.45);border:none;color:#1a3a25;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;
  opacity:0;transition:opacity .18s,background .15s;backdrop-filter:blur(4px);}
.mfd-bal-warrow:hover{background:rgba(255,255,255,.72);}
.mfd-balance:hover .mfd-bal-warrow{opacity:1;}
.mfd-bal-wl{left:8px;}
.mfd-bal-wr{right:8px;}

.mfd-balance-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.mfd-balance-wname-wrap{position:relative;}
.mfd-balance-wname{display:inline-flex;align-items:center;gap:5px;min-width:0;background:transparent;border:none;border-radius:5px;
  padding:2px 4px 2px 0;cursor:pointer;color:#fff;font:600 13px/1 var(--font-sans);transition:background .15s;}
.mfd-balance-wname:hover{background:rgba(255,255,255,.1);}
.mfd-balance-wname-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mfd-balance-updated{font-size:11px;line-height:1.4;color:rgba(255,255,255,.78);text-align:right;flex-shrink:0;}
.mfd-balance-sublabel-row{display:flex;align-items:center;gap:6px;margin-top:14px;}
.mfd-balance-sublabel{font-size:11px;font-weight:600;color:rgba(255,255,255,.72);letter-spacing:.02em;}
.mfd-balance-row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
.mfd-balance-value{font-size:31px;font-weight:600;letter-spacing:-.02em;line-height:1.05;margin-top:3px;}
.mfd-balance-addcredit{background:#000;color:#fff;border:none;border-radius:8px;padding:8px 14px;
  font-size:12.5px;font-weight:600;font-family:var(--font-sans);cursor:pointer;flex-shrink:0;}
.mfd-balance-addcredit:hover{background:#1a1a1a;}
.mfd-balance-band{display:flex;margin-top:12px;border-radius:9px;background:rgba(0,0,0,.14);overflow:hidden;}
.mfd-balance-cell{flex:1;padding:9px 12px;}
.mfd-balance-cell + .mfd-balance-cell{border-left:1px solid rgba(0,0,0,.16);}
.mfd-balance-cell-est{flex:.65;}
.mfd-balance-cell-l{font-size:11px;color:rgba(255,255,255,.82);}
.mfd-balance-cell-v{font-size:15px;font-weight:600;margin-top:3px;}
.mfd-balance-cell-s{font-size:11.5px;color:rgba(255,255,255,.78);margin-top:1px;}
.mfd-balance-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.mfd-balance-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.32);border:0;padding:0;cursor:pointer;transition:background .15s,width .2s;}
.mfd-balance-dot.active{background:#fff;width:16px;border-radius:3px;}
.mfd-wallet-abbr{font-size:9.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.28);border-radius:3px;padding:1px 4px;flex-shrink:0;letter-spacing:.02em;}
.mfd-wallet-picker{position:absolute;top:calc(100% + 6px);left:0;width:260px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;
  box-shadow:0 4px 6px rgba(0,0,0,.08),0 12px 28px rgba(0,0,0,.16);z-index:30;overflow:hidden;}
.mfd-wallet-picker-h{font-size:11.5px;font-weight:600;color:var(--fg-tertiary);padding:11px 14px 9px;border-bottom:1px solid var(--border-light);}
.mfd-wallet-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:0;background:transparent;cursor:pointer;text-align:left;font-family:var(--font-sans);transition:background .12s;}
.mfd-wallet-item:hover,.mfd-wallet-item.active{background:var(--green-50);}
.mfd-wallet-item-check{width:16px;color:var(--green-600);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mfd-wallet-item-logo{display:flex;align-items:center;flex-shrink:0;}
.mfd-wallet-item-logo .mfd-wallet-abbr{background:var(--green-100);color:var(--green-700);}
.mfd-wallet-item-name{font-size:13px;font-weight:500;color:var(--fg-primary);flex:1;text-align:left;}
.mfd-wallet-item.active .mfd-wallet-item-name{font-weight:600;color:var(--green-700);}
.mfd-wallet-item-bal{font-size:13px;font-weight:600;color:var(--fg-primary);white-space:nowrap;}

/* Subsidy quota card */
.mfd-quota-card{padding:16px;}
.mfd-quota-veh-body{display:flex;flex-direction:column;gap:0;flex:1;overflow:hidden;}
.mfd-veh-quota-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;}
.mfd-quota-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.mfd-quota-head-main{display:flex;align-items:center;gap:10px;}
.mfd-quota-head-copy{min-width:0;}
.mfd-quota-ico{width:36px;height:36px;border-radius:10px;background:var(--green-50);color:var(--green-600);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mfd-quota-head-right{display:flex;align-items:center;gap:8px;}
.mfd-quota-title{font-size:15px;font-weight:600;color:var(--fg-primary);}
.mfd-quota-sub{font-size:12px;color:var(--fg-tertiary);margin-top:1px;}
.mfd-quota-subrow{display:flex;align-items:center;gap:6px;min-width:0;margin-top:1px;flex-wrap:wrap;}
.mfd-quota-subsep{font-size:12px;color:var(--fg-disabled);}
.mfd-quota-switch-wrap{position:relative;min-width:0;}
.mfd-quota-switch{display:inline-flex;align-items:center;gap:4px;min-width:0;background:transparent;border:none;border-radius:5px;padding:0;cursor:pointer;color:var(--green-700);font:600 12px/1.2 var(--font-sans);}
.mfd-quota-switch-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mfd-subsidy-picker{position:absolute;top:calc(100% + 6px);left:0;width:280px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;
  box-shadow:0 4px 6px rgba(0,0,0,.08),0 12px 28px rgba(0,0,0,.16);z-index:30;overflow:hidden;}
.mfd-subsidy-picker-h{font-size:11.5px;font-weight:600;color:var(--fg-tertiary);padding:11px 14px 9px;border-bottom:1px solid var(--border-light);}
.mfd-subsidy-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:0;background:transparent;cursor:pointer;text-align:left;font-family:var(--font-sans);transition:background .12s;}
.mfd-subsidy-item:hover,.mfd-subsidy-item.active{background:var(--green-50);}
.mfd-subsidy-item-check{width:16px;color:var(--green-600);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mfd-subsidy-item-main{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
.mfd-subsidy-item-name{font-size:13px;font-weight:600;color:var(--fg-primary);}
.mfd-subsidy-item-sub{font-size:11px;color:var(--fg-tertiary);}
.mfd-subsidy-item-val{font-size:12px;font-weight:600;color:var(--fg-secondary);white-space:nowrap;}

.mfd-quota-summary{margin-top:10px;}
.mfd-quota-summary-main{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;color:var(--fg-primary);}
.mfd-quota-summary-strong{font-size:30px;font-weight:700;line-height:1.05;letter-spacing:-.02em;white-space:nowrap;}
.mfd-quota-summary-mid{font-size:22px;font-weight:500;line-height:1;color:var(--fg-secondary);}
.mfd-quota-summary-unit{font-size:14px;font-weight:500;line-height:1.2;color:var(--fg-secondary);}
.mfd-quota-summary-sub{margin-top:6px;font-size:12px;line-height:1.35;color:var(--fg-secondary);}

.mfd-quota-bar-wrap{min-width:0;padding-top:0;margin-top:14px;}
.mfd-quota-tick-lbls{position:relative;height:12px;margin-bottom:6px;}
.mfd-quota-tick-lbls span{position:absolute;transform:translateX(-50%);font-size:11px;font-weight:600;color:var(--amber-500);}
.mfd-quota-tick-lbls span.danger{color:var(--red-400);}
.mfd-quota-track{position:relative;height:8px;background:var(--bg-muted);border-radius:4px;overflow:visible;}
.mfd-quota-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.mfd-quota-fill.green{background:var(--green-500);}
.mfd-quota-fill.amber{background:var(--amber-500);}
.mfd-quota-fill.red{background:var(--red-400);}
.mfd-quota-marker{position:absolute;top:0;bottom:0;width:2px;background:var(--amber-500);border-radius:1px;}
.mfd-quota-marker.danger{background:var(--red-400);}
.mfd-quota-bar-lbls{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--fg-disabled);margin-top:6px;}

.mfd-quota-body-top{flex:1;display:flex;flex-direction:column;}
.mfd-quota-stats{display:flex;justify-content:space-between;align-items:stretch;margin-top:14px;margin-bottom:18px;border-top:none;padding-top:0;}
.mfd-quota-stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.mfd-quota-stat-divided{border-left:1px solid var(--border-light);}
.mfd-quota-stat-v{font-size:16px;font-weight:600;color:var(--fg-primary);}
.mfd-quota-stat-v.amber{color:var(--amber-600);}
.mfd-quota-stat-v.red{color:var(--red-400);}
.mfd-quota-stat-l{font-size:12px;color:var(--fg-secondary);}

.mfd-quota-disclaimer{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-secondary);margin-top:12px;background:var(--bg-muted);border-radius:8px;padding:10px 12px;}

/* Skeleton placeholders */
@keyframes mfd-skel-shimmer{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}
.mfd-skel-line,.mfd-skel-ico,.mfd-skel-track{
  background:linear-gradient(90deg,var(--bg-muted) 25%,var(--bg-hover) 50%,var(--bg-muted) 75%);
  background-size:200% 100%;
  animation:mfd-skel-shimmer 1.6s infinite linear;
  border-radius:4px;
}
.mfd-skel-line{margin-top:6px;}
.mfd-skel-line:first-child{margin-top:0;}
.mfd-skel-short{margin-top:8px;}
.mfd-skel-ico{width:36px;height:36px;border-radius:10px;flex-shrink:0;}
.mfd-skel-track{height:8px;border-radius:4px;width:100%;}

/* Tooltip on status badge */
.mfd-tooltip-wrap{position:relative;display:inline-flex;align-items:center;gap:6px;}
.mfd-tooltip{position:absolute;top:calc(100% + 8px);right:0;background:#322F35;color:#fff;font-size:12px;line-height:1.5;padding:8px 11px;border-radius:6px;width:220px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;text-align:left;}
.mfd-tooltip-wrap:hover .mfd-tooltip{opacity:1;}
.mfd-tooltip::after{content:"";position:absolute;bottom:100%;right:14px;border:6px solid transparent;border-bottom-color:#322F35;}

.mfd-quota-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;padding:24px 12px;color:var(--fg-tertiary);}
.mfd-quota-empty .msr{color:var(--fg-disabled);}
.mfd-quota-empty-s{font-size:12px;}


/* ── Section 2: Subsidy Quota row ─────────────────────────────── */
.mfd-quota-section{margin-top:16px;}
.mfd-quota-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch;}

/* ── Section 3: Fuel Usage Trend + Top Stations bottom layout ─── */
.mfd-bottom-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:stretch;margin-top:16px;}
.mfd-bottom-layout--single{grid-template-columns:1fr;}
.mfd-bottom-left{display:flex;flex-direction:column;gap:16px;}
.mfd-bottom-right{min-width:0;display:flex;flex-direction:column;min-height:0;}
.mfd-trend-row{margin-top:0;}
.mfd-stations-card{flex:1;display:flex;flex-direction:column;min-height:0;max-height:100%;}
.mfd-stations-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:0;padding-top:2px;}
.mfd-stations-card .ml-history-card{box-shadow:0 1px 2px rgba(0,0,0,.04);}
.mfd-stations-rank{width:24px;height:24px;border-radius:50%;background:var(--bg-muted);color:var(--fg-secondary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.mfd-stations-medal{position:relative;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.mfd-stations-medal-rank{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.25);}
.mfd-stations-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;}
.mfd-stations-pager-range{font-size:12px;color:var(--fg-secondary);}
.mfd-stations-pagebtns{display:flex;align-items:center;gap:4px;}
.mfd-stations-pagebtns button{width:28px;height:28px;border:1px solid var(--border-light);background:var(--bg-card);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--fg-secondary);cursor:pointer;}
.mfd-stations-pagebtns button:not(:disabled):hover{background:var(--bg-muted);color:var(--fg-primary);}
.mfd-stations-pagebtns button:disabled{opacity:.35;cursor:not-allowed;}
.mfd-stations-empty{text-align:center;color:var(--fg-tertiary);padding:34px 12px;font-size:13px;flex:1;display:flex;align-items:center;justify-content:center;}

/* Vertical bar chart */
.mfd-trend-card{min-height:100%;}
.mfd-chart-axislbl{font-size:11px;color:var(--fg-tertiary);margin-bottom:8px;}
.mfd-plotwrap{display:flex;gap:8px;min-height:230px;}
.mfd-yaxis{display:flex;flex-direction:column;justify-content:space-between;height:200px;width:36px;font-size:10px;color:var(--fg-tertiary);text-align:right;padding-bottom:1px;}
.mfd-plot{flex:1;min-width:0;display:flex;flex-direction:column;}
.mfd-bars{position:relative;display:flex;align-items:flex-end;gap:12px;height:200px;padding:0 4px;border-bottom:1px solid var(--border-medium);
  background-image:repeating-linear-gradient(to top,transparent,transparent 39.8px,var(--border-light) 39.8px,var(--border-light) 40px);}
.mfd-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%;cursor:pointer;}
.mfd-bar-val{font-size:10px;font-weight:600;color:var(--fg-secondary);}
.mfd-bar-group{position:relative;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center;}
.mfd-bar-track{position:relative;width:100%;max-width:28px;height:100%;display:flex;align-items:flex-end;justify-content:center;border-radius:5px 5px 0 0;transition:background .15s;}
.mfd-bar-track.active,.mfd-bar-col:hover .mfd-bar-track{background:rgba(0,0,0,.045);}
.mfd-bar-stack{width:100%;display:flex;flex-direction:column-reverse;border-radius:4px 4px 0 0;overflow:hidden;transition:height .3s,filter .15s;}
.mfd-bar-col:hover .mfd-bar-stack{filter:brightness(.97);}
.mfd-bar-seg{width:100%;}
.mfd-bar-tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%) translateY(-8px);background:#fff;padding:9px 13px;border:1px solid var(--border-light);border-radius:8px;z-index:5;pointer-events:none;box-shadow:0 6px 16px rgba(0,0,0,.12);text-align:left;min-width:150px;}
.mfd-bar-tip-period{font-size:11px;font-weight:500;color:var(--fg-tertiary);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border-light);}
.mfd-bar-tip-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--fg-primary);padding:2px 0;white-space:nowrap;}
.mfd-bar-tip-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.mfd-bar-tip-row strong{font-weight:600;margin-left:auto;}
.mfd-xaxis{display:flex;gap:12px;padding:8px 4px 0;}
.mfd-xlbl{flex:1;font-size:10px;color:var(--fg-tertiary);text-align:center;white-space:nowrap;}
.mfd-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;align-items:center;}
.mfd-leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--fg-secondary);}
.mfd-leg-dot{width:10px;height:10px;border-radius:3px;}

/* Cardhead right-side slot */
.mfd-cardhead-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

/* Quota by vehicle horizontal bars */
.mfd-quota-veh-card{height:100%;display:flex;flex-direction:column;}
.mfd-vehicle-search{height:34px;min-width:0;width:220px;display:flex;align-items:center;gap:8px;padding:0 10px;border:1px solid var(--border-light);border-radius:7px;color:var(--fg-tertiary);background:var(--bg-card);transition:border-color .15s,box-shadow .15s;}
.mfd-vehicle-search:focus-within{border-color:var(--green-500);box-shadow:0 0 0 3px var(--green-50);}
.mfd-vehicle-search input{min-width:0;flex:1;border:0;outline:0;background:transparent;font:inherit;font-size:12.5px;color:var(--fg-primary);}
.mfd-vehicle-search input::placeholder{color:var(--fg-disabled);}
.mfd-vehicle-search button{border:0;background:transparent;color:var(--fg-tertiary);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px;width:22px;height:22px;margin-right:-5px;}
.mfd-vehicle-search button:hover{background:var(--bg-muted);color:var(--fg-primary);}

.mfd-veh-quota-list{display:flex;flex-direction:column;gap:0;margin-top:10px;}
.mfd-veh-quota-row{display:grid;grid-template-columns:74px 1fr 100px;align-items:center;gap:10px;min-height:31px;}
.mfd-veh-quota-lbl{font-size:12px;font-weight:600;color:var(--fg-primary);}
.mfd-veh-quota-bar{position:relative;min-width:0;}
.mfd-veh-quota-track{position:relative;height:5px;background:var(--bg-muted);border-radius:3px;overflow:hidden;}
.mfd-veh-quota-fill{height:100%;border-radius:3px;transition:width .3s ease;}
.mfd-veh-quota-fill.within{background:var(--green-500);}
.mfd-veh-quota-fill.at-risk{background:var(--amber-500);}
.mfd-veh-quota-fill.critical{background:var(--red-400);}
.mfd-veh-quota-val{font-size:12px;font-weight:600;color:var(--fg-primary);text-align:right;white-space:nowrap;}
.mfd-veh-quota-of{font-weight:400;color:var(--fg-tertiary);}

.mfd-vehicle-footer{display:flex;flex-direction:column;align-items:stretch;gap:8px;margin-top:auto;padding-top:0;}
.mfd-vehicle-legend{margin-top:10px;gap:12px;}
.mfd-vehicle-footer-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.mfd-vehicle-pager-range{font-size:12px;color:var(--fg-secondary);}
.mfd-vehicle-pagebtns{display:flex;align-items:center;gap:4px;}
.mfd-vehicle-pagebtns button{width:28px;height:28px;border:1px solid var(--border-light);background:var(--bg-card);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--fg-secondary);cursor:pointer;}
.mfd-vehicle-pagebtns button:not(:disabled):hover{background:var(--bg-muted);color:var(--fg-primary);}
.mfd-vehicle-pagebtns button:disabled{opacity:.35;cursor:not-allowed;}

/* ── Section 4: Account Activity ─────────────────────────────── */
.mfd-activity{margin-top:16px;}
.mfd-activity-nav{display:flex;gap:4px;overflow-x:auto;min-width:0;border-bottom:1px solid var(--border-light);}
.mfd-activity-body{margin-top:16px;}
.mfd-activity-viewall{display:flex;justify-content:center;margin-top:14px;}
.mfd-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-light);margin-bottom:16px;}
.mfd-tab{padding:10px 14px;font-size:13px;}

.mfd-table-wrap{border:1px solid var(--border-medium);border-radius:6px;overflow-x:auto;}
.mfd-table th{white-space:nowrap;}
.mfd-table td{white-space:nowrap;}
.mfd-table-clickable tbody tr.mfd-row-click{cursor:pointer;}
.mfd-table-clickable tbody tr.mfd-row-click:hover td{background:var(--bg-muted);}
.mfd-fuel-preview-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.mfd-fuel-preview-card{position:relative;border:1px solid var(--border-light);border-radius:var(--radius-md);background:#fff;padding:14px 14px 12px;cursor:pointer;transition:box-shadow .14s,transform .14s;overflow:hidden;display:flex;flex-direction:column;height:100%;}
.mfd-fuel-preview-card:hover{box-shadow:0 4px 14px rgba(20,29,24,.12);transform:translateY(-1px);}
.mfd-fuel-preview-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:11px;font-weight:500;color:var(--fg-tertiary);min-width:0;}
.mfd-fuel-preview-provider{display:inline-flex;align-items:center;gap:6px;min-width:0;}
.mfd-fuel-preview-provider .ml-petron-logo{border-radius:4px;flex-shrink:0;}
.mfd-fuel-preview-provider-stack{display:flex;flex-direction:column;gap:1px;min-width:0;}
.mfd-fuel-preview-provider-stack span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;font-weight:600;color:var(--fg-secondary);}
.mfd-fuel-preview-meta > span{min-width:0;flex-shrink:1;}
.mfd-fuel-preview-mono{font-size:10px;font-weight:400;color:var(--fg-tertiary);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.mfd-fuel-preview-primary{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-top:10px;min-width:0;}
.mfd-fuel-preview-vehicle{font-size:17px;font-weight:700;line-height:1.1;color:var(--fg-primary);letter-spacing:-.01em;}
.mfd-fuel-preview-amount{font-size:17px;font-weight:700;color:var(--navy-800);line-height:1.1;white-space:nowrap;}
.mfd-fuel-preview-sign{color:var(--red-400);}
.mfd-fuel-preview-secondary{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px;min-width:0;}
.mfd-fuel-preview-location{font-size:12px;font-weight:400;color:var(--fg-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mfd-fuel-preview-volume{font-size:12px;font-weight:500;color:var(--fg-secondary);white-space:nowrap;flex-shrink:0;}
.mfd-fuel-preview-subsidy{display:flex;align-items:center;gap:6px;margin-top:10px;}
.mfd-fuel-preview-subsidy-label{font-size:12px;font-weight:500;color:var(--fg-tertiary);}
.mfd-fuel-preview-subsidy-value{font-size:14px;font-weight:700;color:var(--green-600);}
.mfd-fuel-preview-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0;margin-top:auto;margin-right:-14px;margin-bottom:-12px;margin-left:-14px;padding:14px 14px 7px;background:var(--bg-muted);border-top:1px solid var(--border-light);border-radius:0 0 var(--radius-md) var(--radius-md);}
.mfd-fuel-preview-chevron{color:var(--fg-tertiary);display:flex;align-items:center;}
.mfd-history-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;}
.mfd-history-action{width:28px;height:28px;border:0;background:transparent;color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;border-radius:6px;}
.mfd-history-action:hover{background:var(--bg-muted);color:var(--fg-primary);}
.mfd-history-account{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--fg-secondary);}
.mfd-history-account .ml-petron-logo{border-radius:4px;flex-shrink:0;}
.mfd-history-amount{font-weight:700;color:var(--navy-800);}
.mfd-history-amountpill{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:999px;background:rgba(0,170,79,.05);white-space:nowrap;flex-shrink:0;font-weight:700;color:var(--navy-800);}
.mfd-history-plus{font-size:16px;font-weight:600;color:#00aa4f;line-height:1;}
.mfd-rebate-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;}
.mfd-rebate-pager-range{font-size:12px;color:var(--fg-secondary);}
.mfd-rebate-pagebtns{display:flex;align-items:center;gap:4px;}
.mfd-rebate-pagebtns button{width:28px;height:28px;border:1px solid var(--border-light);background:var(--bg-card);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--fg-secondary);cursor:pointer;}
.mfd-rebate-pagebtns button:not(:disabled):hover{background:var(--bg-muted);color:var(--fg-primary);}
.mfd-rebate-pagebtns button:disabled{opacity:.35;cursor:not-allowed;}

.mfd-cell-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;color:var(--fg-secondary);}
.mfd-subsidy{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--green-600);background:var(--green-50);padding:2px 7px;border-radius:var(--radius-pill);}
.mfd-subsidy-none{color:var(--fg-tertiary);}
.mfd-amount{font-weight:600;color:var(--fg-primary);}
.mfd-status{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--radius-pill);text-transform:capitalize;}
.mfd-status.successful{background:var(--green-50);color:var(--green-600);}
.mfd-status.pending{background:var(--amber-50);color:var(--amber-600);}
.mfd-status.completed{background:var(--green-50);color:var(--green-600);}
.mfd-status.processed{background:var(--green-50);color:var(--green-600);}
.mfd-table-empty{text-align:center;color:var(--fg-tertiary);padding:34px 12px;font-size:13px;}

/* Leave confirmation modal */
.mfd-leave-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mfd-leave-modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:380px;padding:22px 24px 24px;box-shadow:0 8px 40px rgba(0,0,0,.18);text-align:center;}
.mfd-leave-title{font-size:17px;font-weight:600;color:var(--fg-primary);margin-bottom:8px;}
.mfd-leave-msg{font-size:13px;line-height:1.5;color:var(--fg-secondary);margin-bottom:22px;}
.mfd-leave-actions{display:flex;gap:10px;justify-content:center;}
.mfd-leave-actions button{height:38px;padding:0 16px;border-radius:8px;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
.mfd-leave-stay{background:var(--bg-muted);color:var(--fg-primary);}
.mfd-leave-stay:hover{background:var(--bg-hover);}
.mfd-leave-exit{background:var(--green-600);color:#fff;}
.mfd-leave-exit:hover{background:#009945;}

/* Transaction detail modal */
.mfd-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;}
.mfd-modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22);}
.mfd-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-light);}
.mfd-modal-title{font-size:15px;font-weight:600;color:var(--fg-primary);}
.mfd-modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-light);background:var(--bg-surface);color:var(--fg-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;padding:0;}
.mfd-modal-close:hover{border-color:var(--border-medium);background:var(--bg-muted);}
.mfd-modal-hero{padding:20px 20px 16px;border-bottom:1px solid var(--border-light);}
.mfd-modal-txnid{font-size:12px;color:var(--fg-tertiary);margin-bottom:4px;}
.mfd-modal-amount{font-size:28px;font-weight:600;color:var(--fg-primary);letter-spacing:-.02em;line-height:1;}
.mfd-modal-meta{font-size:12px;color:var(--fg-secondary);margin-top:6px;}
.mfd-modal-body{padding:4px 0 8px;}
.mfd-modal-section{padding:16px 20px;border-bottom:1px solid var(--border-light);}
.mfd-modal-section:last-child{border-bottom:none;}
.mfd-modal-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.mfd-modal-row:last-child{margin-bottom:0;}
.mfd-modal-lbl{font-size:11px;font-weight:500;color:var(--fg-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.mfd-modal-val{font-size:13px;font-weight:500;color:var(--fg-primary);}

/* Empty block */
.mfd-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:34px 16px;text-align:center;color:var(--fg-tertiary);}
.mfd-empty .msr{color:var(--border-strong,#c7cdcb);}
.mfd-empty-t{font-size:13px;font-weight:600;color:var(--fg-secondary);}
.mfd-empty-s{font-size:12px;color:var(--fg-tertiary);max-width:240px;}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width:1080px){
  .mfd-pulse{grid-template-columns:1fr 1fr;}
  .mfd-balance{grid-column:1 / -1;}
  .mfd-quota-row{grid-template-columns:1fr;}
}
@media (max-width:680px){
  .mfd-shell{grid-template-columns:1fr;}
  .mfd-rail{position:fixed;left:50%;top:auto;bottom:16px;transform:translateX(-50%);z-index:60;
    width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;background:rgba(255,255,255,.92);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border-light);
    border-radius:var(--radius-pill);box-shadow:0 8px 28px rgba(0,0,0,.16);overflow:visible;}
  .mfd-rail-logo{display:none;}
  .mfd-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:var(--radius-pill);}
  .mfd-rail-item span:not(.msr){font-size:11px;}
  .mfd-rail-item:not(.active) span:not(.msr){display:none;}
  .mfd-rail-item.active{background:#fff;color:var(--green-600);}
  .mfd-content{display:flex;flex-direction:column;gap:16px;padding:16px 14px 96px;}
  .mfd-pagehead{flex-direction:column;gap:12px;margin-bottom:0;}
  .mfd-pulse{display:contents;}
  .mfd-balance{order:1;}
  .mfd-statscroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:12px;order:2;margin:0;padding:0 2px 2px;scroll-padding-inline:2px;}
  .mfd-statscroll::-webkit-scrollbar{display:none;}
  .mfd-statscroll>*{flex-shrink:0;width:86%;scroll-snap-align:start;}
  .mfd-quota-section{order:3;margin-top:0;}
  .mfd-quota-row{grid-template-columns:1fr;}
  .mfd-bottom-layout{display:contents;}
  .mfd-bottom-left{display:contents;}
  .mfd-bottom-right{display:contents;}
  .mfd-trend-row{order:4;margin-top:0;}
  .mfd-stations-card{order:5;height:auto;}
  .mfd-activity{order:6;margin-top:0;}
  .mfd-shell .ml-statcard{padding:12px;}
  .mfd-shell .ml-statcard-ico{width:32px;height:32px;border-radius:9px;}
  .mfd-shell .ml-statcard-count{font-size:22px;}
  .mfd-shell .ml-statcard-labelrow{margin-top:8px;gap:1px;}
  .mfd-shell .ml-statcard-label{font-size:13px;}
  .mfd-shell .ml-statcard-sub{font-size:10.5px;}
  .mfd-shell .ml-statcard-action{width:24px;height:24px;}
  .mfd-shell .ml-statcard-band{margin:10px -12px -12px;padding:10px 12px;gap:12px;}
  .mfd-shell .ml-statcard-n{font-size:15px;}
  .mfd-shell .ml-statcard-l{font-size:10px;margin-top:2px;}
  .mfd-title{font-size:18px;}
  .mfd-cardhead{flex-direction:column;gap:10px;}
  .mfd-cardhead-actions{width:100%;}
  .mfd-activity-viewall{justify-content:center;}
  .mfd-activity-viewall .ml-btn-text-blue{width:100%;justify-content:center;}
  .mfd-fuel-preview-list{grid-template-columns:1fr;}
  .mfd-fuel-preview-vehicle{font-size:14px;}
  .mfd-history-list{grid-template-columns:1fr;}
  .ml-history-card-body{grid-template-columns:1fr;gap:8px;}
  .mfd-quota-veh-card .mfd-quota-head{flex-direction:column;gap:10px;}
  .mfd-quota-veh-card .mfd-quota-head-right{width:100%;}
  .mfd-vehicle-search{width:100%;}
  .mfd-quota-hero-used{font-size:22px;}
  .mfd-quota-hero-row{gap:5px;}
  .mfd-quota-hero-of{font-size:12px;}
  .mfd-quota-metric{width:136px;padding-left:2px;}
  .mfd-vehicle-footer{gap:12px;}
  .mfd-vehicle-footer-bottom{width:100%;}
  .mfd-yaxis{width:26px;height:160px;font-size:9px;}
  .mfd-bars{height:160px;gap:8px;background-image:repeating-linear-gradient(to top,transparent,transparent 31.8px,var(--border-light) 31.8px,var(--border-light) 32px);}
  .mfd-bar-track{max-width:18px;}
  .mfd-xlbl{font-size:9px;}
  .mfd-updated{display:none;}
  .mfd-org-name{max-width:160px;}
  .mfd-bal-warrow{display:none;}
}
</style>

<script>
  document.addEventListener('keydown', function(e){
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'e') {
      e.preventDefault();
      var panel = document.querySelector('[data-omelette-chrome]');
      if (panel) window.postMessage({ type: '__deactivate_edit_mode' }, '*');
      else window.postMessage({ type: '__activate_edit_mode' }, '*');
    }
  });
</script>
