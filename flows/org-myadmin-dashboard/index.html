<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyAdmin Dashboard — Org Portal</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<style>
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:#fff;}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}
.mad-shell{display:grid;grid-template-columns:72px 1fr;min-height:100vh;background:#fff;}
.mad-rail-wrap{position:sticky;top:0;align-self:start;height:100vh;z-index:25;}
.mad-rail{height:100%;background:#fff;border-right:1px solid var(--border-light);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;width:72px;transition:width .18s ease,box-shadow .18s ease;}
.mad-rail::-webkit-scrollbar{width:0;}
.mad-rail.expanded{width:220px;align-items:stretch;box-shadow:4px 0 16px rgba(0,0,0,.08);}
.mad-rail-profile{display:flex;align-items:center;gap:4px;margin-bottom:12px;padding:6px 4px;border-radius:10px;cursor:pointer;transition:background .14s;}
.mad-rail-profile:hover{background:var(--bg-muted);}
.mad-rail.expanded .mad-rail-profile{flex-direction:row;align-items:center;gap:10px;cursor:default;}
.mad-rail-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mad-rail-avatar{width:32px;height:32px;border-radius:50%;background:rgb(223,234,239);display:flex;align-items:center;justify-content:center;}
.mad-rail-badge{border-radius:12px;background:var(--gradient-brand);padding:1px 5px;font-size:6px;font-weight:700;color:#fff;line-height:1.6;letter-spacing:0.5px;text-transform:uppercase;}
.mad-rail-profile-text{display:flex;flex-direction:column;gap:2px;overflow:hidden;min-width:0;}
.mad-rail-profile-role{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--fg-tertiary);white-space:nowrap;}
.mad-rail-profile-name{font-size:14px;font-weight:600;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mad-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;text-decoration:none;padding:6px 2px;border:none;background:transparent;font-family:inherit;}
.mad-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.15;max-width:100%;}
.mad-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.mad-rail-item.active{background:var(--green-50);color:var(--green-600);}
.mad-rail.expanded .mad-rail-item{flex-direction:row;justify-content:flex-start;width:100%;padding:10px 8px;gap:10px;}
.mad-rail.expanded .mad-rail-item span:not(.msr){font-size:13px;text-align:left;max-width:none;}
.mad-rail-divider{background:#f6f6f6;height:1px;width:100%;margin:8px 0;flex-shrink:0;}
.mad-rail-footer{display:flex;flex-direction:column;gap:2px;width:100%;margin-top:auto;flex-shrink:0;}
.mad-rail-signout{color:#D55F5A;}
.mad-rail-toggle{position:absolute;top:34px;left:57px;width:28px;height:28px;border-radius:8px;background:#fff;border:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:26;box-shadow:0 2px 6px rgba(0,0,0,.06);color:var(--fg-secondary);transition:left .18s ease;}
.mad-rail-wrap.expanded .mad-rail-toggle{left:205px;}
.mad-main{min-width:0;background:#fff;}
.mad-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:12px 24px;background:#fff;border-bottom:1px solid var(--border-light);}
.mad-topbar-spacer{flex:1;}
.mad-iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border-light);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-secondary);flex-shrink:0;}
.mad-closebtn{text-decoration:none;border:none;background:var(--bg-muted);border-radius:8px;}
.mad-closebtn:hover{border-color:transparent;background:var(--bg-hover);color:var(--fg-primary);}
.mad-content{padding:22px 24px 48px;margin:0 auto;}
.mad-pagehead{margin-bottom:18px;}
.mad-title{font-size:20px;font-weight:600;color:var(--fg-primary);margin:0;}
.mad-subtitle{margin-top:6px;font-size:13px;color:var(--fg-secondary);}
.mad-overview{display:flex;flex-direction:column;gap:16px;margin-bottom:18px;}
.mad-overview > *{min-width:0;margin-bottom:0;}
.mad-overview-main{display:flex;flex-direction:column;gap:16px;min-width:0;}
.mad-doc-expiry-layout{grid-template-columns:minmax(0,5fr) minmax(440px,5fr);gap:18px;align-items:start;}
.mad-doc-expiry-layout .ml-cardhead{grid-column:1 / -1;}
.mad-doc-expiry-main{min-width:0;}
.mad-doc-expiry-side{min-width:0;display:flex;flex-direction:column;}

/* ── Fleet Status Summary ─────────────────────────────────────── */
.mad-kpi-stack{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;align-items:stretch;}
.mad-kpi-row{display:contents;}
.mad-kpi-row > *{height:100%;}
.mad-kpi-row .ml-statcard,
.mad-kpi-row .ed-kpi-tile,
.mad-kpi-row .ed-kpi-tile .ml-statcard{height:100%;}
.mad-kpi-primary{min-height:176px;}
.mad-kpi-doc-main{display:block;width:100%;padding:0;border:0;background:transparent;text-align:left;font:inherit;color:inherit;}
.mad-kpi-doc-main:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(0,170,79,.18);border-radius:8px;}
.mad-kpi-stack .ml-statcard-cell{cursor:default;}
.mad-cell-btn{cursor:pointer;}
.ml-statcard-cell.mad-cell-btn{border:none;background:transparent;font-family:inherit;}
.mad-inline-link{margin-top:8px;border:none;background:transparent;padding:0;color:var(--green-700);font:700 12px/1 var(--font-sans);cursor:pointer;text-align:left;}
.mad-inline-link:hover{text-decoration:underline;}

/* ── Document Expiry chart card (reuses .ed-card/.ed-chart/.ed-bar-* shapes) ── */
.ed-card.mad-doc-expiry-layout{display:grid;}
.mad-chartcard{min-width:0;}
.mad-chart-controls{display:flex;align-items:center;gap:10px;}
.mad-range-panel{margin-top:10px;}
.mad-range-list{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.mad-range-card{border:1px solid transparent;background:#F3F4F6;border-radius:999px;padding:5px 12px;display:inline-flex;align-items:center;justify-content:flex-start;gap:8px;cursor:pointer;text-align:left;transition:background .15s ease, color .15s ease;font:inherit;flex:0 0 auto;color:var(--fg-secondary);}
.mad-range-card:hover{background:#E9EBEE;}
.mad-range-card:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(0,170,79,.14);}
.mad-range-card-label{font-size:12.5px;font-weight:700;color:inherit;}
.mad-range-card-count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1;color:inherit;opacity:.75;}
.mad-range-card.active{background:var(--green-500);color:#fff;}
.mad-range-card.active:hover{background:var(--green-600);}
.mad-range-card-row{padding:6px 10px;border-radius:8px;background:transparent;color:var(--fg-primary);border-color:var(--border-light);}
.mad-range-card-row:hover{background:var(--bg-muted);}
.mad-range-card-row.active{background:var(--green-50);color:var(--green-600);border-color:var(--green-200);}
.mad-range-card-row.active:hover{background:var(--green-50);}
.mad-range-card-row .mad-range-card-count{background:var(--bg-muted);opacity:1;}
.mad-range-card-row.active .mad-range-card-count{background:rgba(255,255,255,.15);}
.mad-range-more{display:none;border:1px solid var(--border-light);background:#fff;border-radius:999px;padding:5px 12px;align-items:center;gap:4px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--fg-secondary);font-family:inherit;}
.mad-range-more:hover{background:var(--bg-muted);}
.mad-range-more-wrap{position:relative;display:inline;}
.mad-range-dropdown{position:absolute;left:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--border-light);border-radius:8px;box-shadow:var(--shadow-md);min-width:170px;overflow:hidden;z-index:40;}
.mad-range-dropdown-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;font-size:12.5px;color:var(--fg-primary);cursor:pointer;width:100%;border:none;background:transparent;font-family:inherit;}
.mad-range-dropdown-item:hover{background:var(--bg-muted);}
.mad-range-dropdown-item.active{background:var(--green-50);color:var(--green-600);}
.mad-range-dropdown-label{font-weight:600;}
.mad-range-dropdown-count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1;background:var(--bg-muted);color:var(--fg-secondary);}
.mad-chart-body{margin-top:16px;}
.mad-chart-panel{border:1px solid var(--border-light);border-radius:16px;background:linear-gradient(180deg,#FFFFFF 0%, #FAFCFB 100%);padding:26px 18px 16px;}
.ed-chart{margin-top:0;}
.ed-chart-plotwrap{display:flex;gap:8px;}
.ed-chart-yaxis{display:flex;flex-direction:column;justify-content:space-between;font-size:10.5px;color:var(--fg-tertiary);height:307px;padding:2px 0;text-align:right;width:30px;}
.ed-chart-plot{position:relative;flex:1;height:307px;}
.ed-bars{position:absolute;inset:0;display:flex;align-items:flex-end;gap:12px;padding:0 6px;border-bottom:1px solid var(--border-medium);}
.ed-bar-col{position:relative;flex:1;height:100%;display:flex;align-items:flex-end;justify-content:center;cursor:pointer;border-radius:4px;transition:background .15s;}
.ed-bar-col:hover{background:rgba(0,129,170,.06);}
.ed-bar-track{width:100%;max-width:48px;height:100%;display:flex;flex-direction:column-reverse;border-radius:6px 6px 0 0;overflow:hidden;}
.ed-bar-seg{width:100%;}
.ed-bar-seg:last-child{border-radius:6px 6px 0 0;}
.ed-bar-tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%) translateY(-10px);background:#fff;padding:9px 13px;border:1px solid var(--border-light);border-radius:10px;white-space:nowrap;z-index:10;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:left;}
.ed-bar-tip-val{font-size:15px;font-weight:700;color:var(--navy-800);line-height:1.2;}
.ed-bar-tip-row{font-size:11.5px;color:var(--fg-secondary);margin-top:3px;display:flex;align-items:center;gap:5px;}
.ed-bar-tip-row .ed-dot{width:7px;height:7px;}
.ed-chart-xaxis{display:flex;gap:16px;margin-left:calc(30px + 8px);margin-top:6px;}
.ed-chart-xaxis span{flex:1;text-align:center;font-size:10.5px;color:var(--fg-tertiary);}
.ed-chart-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:11.5px;color:var(--fg-secondary);}
.ed-chart-legend span{display:inline-flex;align-items:center;gap:5px;}
.ed-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}
.ed-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;}
.ed-emptyrow{text-align:center;color:var(--fg-tertiary);padding:34px 12px;font-size:13px;}
.ed-queue-footer{display:flex;justify-content:center;margin-top:16px;}

/* ── Document Action List ─────────────────────────────────────── */
.mad-doclist{width:100%;min-width:0;display:flex;flex-direction:column;height:100%;}
.mad-doclist-head{margin-top:24px;margin-bottom:18px;}
.mad-doclist-summary{font-size:13px;font-weight:600;color:var(--fg-primary);line-height:1.4;}
.mad-doc-grid{display:flex;flex-direction:column;gap:8px;}
.mad-doc-row{border:1px solid var(--border-light);border-radius:12px;background:#fff;padding:12px 16px;display:flex;align-items:center;gap:32px;}
.mad-doc-row-main{display:flex;align-items:center;gap:12px;flex:0 0 200px;min-width:0;}
.mad-doc-row-copy{min-width:0;flex:1 1 auto;}
.mad-doc-card-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg-muted);color:var(--fg-secondary);}
.mad-doc-card-subject{font-size:14px;font-weight:700;color:var(--fg-primary);line-height:1.2;}
.mad-doc-card-type{margin-top:2px;font-size:12px;color:var(--fg-secondary);}
.mad-doc-card-field{display:flex;flex-direction:column;gap:2px;min-width:0;text-align:left;flex:0 0 100px;}
.mad-doc-card-label{font-size:11px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--fg-tertiary);white-space:nowrap;}
.mad-doc-card-value{font-size:13px;font-weight:600;color:var(--fg-primary);line-height:1.35;white-space:nowrap;}
.mad-doc-card-value.expired{color:#D55F5A;}
.mad-doc-card-value.soon{color:var(--amber-600);}
.mad-doc-row .ml-badge{padding:4px 10px;border-radius:999px;border:1px solid transparent;flex-shrink:0;margin-left:auto;}
.mad-doc-row .ml-badge.comm-expired{background:#FFF1F1;border-color:var(--red-400);color:var(--red-400);}

/* ── Activity Tabs ─────────────────────────────────────────────── */
.mad-activity{clear:both;}
.mad-activity .ml-tabs{border-bottom:none;}
.mad-activity-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px;align-items:start;}
.mad-activity-grid--compact{grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
.mad-check-card{padding:0;overflow:hidden;}
.mad-check-card-body .od-cl-col-sub{text-transform:none;letter-spacing:0;}

/* Leave confirmation modal */
.mad-leave-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mad-leave-modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:380px;padding:22px 24px 24px;box-shadow:0 8px 40px rgba(0,0,0,.18);text-align:center;}
.mad-leave-title{font-size:17px;font-weight:600;color:var(--fg-primary);margin-bottom:8px;}
.mad-leave-msg{font-size:13px;line-height:1.5;color:var(--fg-secondary);margin-bottom:22px;}
.mad-leave-actions{display:flex;gap:10px;justify-content:center;}
.mad-leave-actions button{height:38px;padding:0 16px;border-radius:8px;font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
.mad-leave-stay{background:var(--bg-muted);color:var(--fg-primary);}
.mad-leave-stay:hover{background:var(--bg-hover);}
.mad-leave-exit{background:var(--green-600);color:#fff;}
.mad-leave-exit:hover{background:#009945;}

@media (min-width:1024px) and (max-width:1180px){
  .mad-kpi-stack{grid-template-columns:repeat(2,minmax(0,1fr));}
}

@media (max-width:1023px){
  .mad-shell{grid-template-columns:1fr;}
  .mad-rail-wrap{position:fixed;left:50%;bottom:16px;top:auto;transform:translateX(-50%);height:auto;z-index:60;}
  .mad-rail,.mad-rail.expanded{width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border-light);border-radius:999px;box-shadow:0 8px 28px rgba(0,0,0,.16);align-items:center;}
  .mad-rail-profile,.mad-rail-toggle,.mad-rail-divider,.mad-rail-footer{display:none;}
  .mad-rail-item,.mad-rail.expanded .mad-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:999px;}
  .mad-rail-item span:not(.msr),.mad-rail.expanded .mad-rail-item span:not(.msr){font-size:11px;}
  .mad-rail-item:not(.active) span:not(.msr){display:none;}
  .mad-topbar{padding:10px 14px;}
  .mad-content{padding:16px 14px 96px;}
  .mad-doc-expiry-layout{grid-template-columns:1fr;}
  .mad-doc-expiry-layout .ml-cardhead{grid-column:auto;}
  .mad-doc-expiry-main{padding-bottom:18px;}
  .ed-chart-yaxis{height:180px;}
  .ed-chart-plot{height:180px;}
  .mad-chart-controls{width:100%;}
  .mad-chart-controls .ml-seg{width:100%;display:flex;}
  .mad-chart-controls .ml-seg-btn{flex:1;}
  .mad-kpi-stack{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;margin:0 -14px;padding:0 14px;scroll-padding:0 14px;scrollbar-width:none;}
  .mad-kpi-stack::-webkit-scrollbar{display:none;}
  .mad-kpi-row{display:contents;}
  .mad-kpi-stack .ml-statcard{flex:0 0 300px;scroll-snap-align:start;}
  .mad-kpi-stack::after{content:"";flex:0 0 14px;}
  .mad-activity-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .mad-range-more{display:inline-flex;border-radius:8px;padding:6px 10px;min-height:34px;}
}
@media (max-width:640px){
  .mad-kpi-primary{min-height:0;}
  .ed-chart-plotwrap{overflow-x:auto;}
  .mad-activity-grid,
  .mad-activity-grid--compact{grid-template-columns:1fr;}
  .mad-doc-row{flex-wrap:wrap;gap:12px;}
  .mad-doc-row-main{flex-basis:100%;}
  .mad-doc-row-copy{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
  .mad-doc-card-type{margin-top:0;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="../../shared/shared-shell.js?v=20260715a"></script>
<script src="data.js?v=20260709y"></script>
<script src="app.js?v=20260709y"></script>
</body>
</html>
