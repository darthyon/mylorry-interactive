<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyLorry · Host — SP Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />
<link rel="stylesheet" href="../../styles/tokens.css" />
<link rel="stylesheet" href="../../styles/components.css" />
<style>
/* Design tokens come from ../../styles/tokens.css (single source of truth).
   Generic form/list/detail primitives come from ../../styles/components.css.
   Only shell layout + SP-specific (.spa-*) styles live here. */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); color: var(--fg-primary); background: #fff; -webkit-font-smoothing: antialiased; }
b { font-weight: 600; }

.msr {
  font-family: 'Material Symbols Rounded'; font-weight: normal; line-height: 1;
  vertical-align: middle; display: inline-block; white-space: nowrap;
  letter-spacing: normal; text-transform: none; word-break: normal;
  -webkit-font-feature-settings: 'liga'; font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
}

/* ── Shell (intentionally inline per flow) ───────────────────────── */
.ml-app { display: grid; grid-template-columns: 69px 1fr; grid-template-rows: 71px 1fr; height: 100vh; }
.ml-topbar { grid-column: 1 / -1; grid-row: 1; background: var(--gradient-brand); border-bottom-right-radius: 12px; display: flex; align-items: center; gap: 18px; padding: 0 26px; position: relative; z-index: 10; }
.ml-burger { background: none; border: none; cursor: pointer; display: flex; padding: 4px; }
.ml-topbar-brand { display: flex; flex-direction: column; gap: 2px; }
.ml-logo { display: flex; align-items: center; min-height: 27px; }
.ml-logo-img { display: block; height: 27px; width: auto; }
.ml-topbar-tag { color: rgba(255,255,255,.7); font-size: 8px; font-weight: 500; letter-spacing: .6px; text-transform: uppercase; white-space: nowrap; }
.ml-topbar-spacer { flex: 1; }
.ml-library-link { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid rgba(255,255,255,.28); border-radius: 999px; color: #fff; text-decoration: none; font-size: 12px; font-weight: 600; background: rgba(255,255,255,.08); transition: background .12s, border-color .12s, transform .12s; }
.ml-library-link:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.42); transform: translateY(-1px); }
.ml-sidebar { grid-column: 1; grid-row: 1 / -1; overflow: visible; position: relative; z-index: 20; }
.ml-sidebar-card { width: 69px; height: 100vh; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: #fff; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding: 12px 5px 16px; }
.ml-sidebar-card::-webkit-scrollbar { width: 2px; }
.ml-sidebar-card::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
.ml-side-top { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.ml-avatar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; padding-bottom: 4px; }
.ml-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgb(223,234,239); display: flex; align-items: center; justify-content: center; }
.ml-avatar-badge { border-radius: 12px; background: var(--gradient-brand); padding: 1px 5px; font-size: 6px; font-weight: 700; color: #fff; line-height: 1.6; letter-spacing: 0.5px; font-family: var(--font-sans); text-transform: uppercase; }
.ml-side-divider { width: 59px; height: 2px; border-radius: 2px; background: var(--bg-subtle); margin: 4px 0; flex-shrink: 0; }
.ml-nav { display: flex; flex-direction: column; gap: 3px; width: 100%; align-items: center; }
.ml-nav-item { width: 59px; height: 54px; border: none; background: none; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--fg-tertiary); font-family: var(--font); transition: background .12s, color .12s; }
.ml-nav-item span { font-size: 8px; line-height: 10px; font-weight: 500; text-align: center; }
.ml-nav-item:hover { background: var(--bg-subtle); color: var(--fg-secondary); }
.ml-nav-item.active { background: var(--green-50); color: var(--green-600); }
.ml-side-bottom { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
.ml-main { grid-column: 2; grid-row: 2; overflow-y: auto; padding: 20px 26px 32px; }

/* ── Page head ───────────────────────────────────────────────────── */
.ml-page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
.ml-h1 { font-size: 24px; font-weight: 700; color: var(--fg-primary); }
.ml-page-head-right { display: flex; align-items: center; gap: 14px; }
.ml-icon-btn { border: none; background: none; cursor: pointer; color: var(--fg-tertiary); display: flex; padding: 4px; border-radius: 4px; }
.ml-icon-btn:hover { background: var(--bg-muted); color: var(--fg-primary); }

/* ── Table cells / misc ──────────────────────────────────────────── */
.ml-cell-main { font-size: 13px; font-weight: 500; color: var(--fg-primary); }
.ml-cell-sub { font-size: 11px; color: var(--fg-tertiary); margin-top: 2px; }
.ml-mono { font-variant-numeric: tabular-nums; color: var(--fg-secondary); }
.ml-k { display: block; font-size: 11px; color: var(--fg-tertiary); font-weight: 500; margin-bottom: 2px; }
.hac-add-tier-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px; border: none; background: var(--green-50); border-radius: var(--radius-sm); color: var(--green-600); font-family: var(--font); font-size: 13px; font-weight: 700; cursor: pointer; }
.hac-add-tier-btn:hover { background: #E4F8EE; }
.hac-tier-empty { display: flex; flex-direction: column; gap: 4px; border: 1px solid var(--red-400); border-radius: 8px; padding: 14px 16px; margin-bottom: 4px; }
.hac-tier-empty > span { font-size: 14px; font-weight: 600; color: var(--red-400); display: flex; align-items: center; gap: 6px; }

/* ════════════════════════════════════════════════════════════════
   SP Account specifics (.spa-*)
   ════════════════════════════════════════════════════════════════ */
.spa-org-select { height: 42px; min-width: 130px; flex-shrink: 0; }

/* List table */
.spa-table { min-width: 1040px; }
.spa-table th, .spa-table td { white-space: nowrap; }
.spa-table th:last-child, .spa-table td:last-child { position: sticky; right: 0; border-left: 1px solid var(--border-light); }
.spa-table th:last-child { background: var(--bg-muted); z-index: 2; }
.spa-table td:last-child { background: #fff; z-index: 1; }
.spa-table tbody tr:hover td:last-child { background: var(--bg-hover); }
.spa-provider-cell { display: inline-flex; align-items: center; gap: 8px; }

/* Agent / referrer cell + "+N more" popover */
.spa-agent-cell { display: inline-flex; align-items: center; gap: 8px; }
.spa-agent-name { font-size: 13px; color: var(--fg-primary); }
.spa-more-link { border: none; background: none; padding: 0; font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--teal-600); cursor: pointer; }
.spa-more-link:hover { text-decoration: underline; }
.spa-more-pop { position: fixed; z-index: 200; min-width: 200px; max-height: 280px; overflow-y: auto; background: #fff; border: 1px solid var(--border-light); border-radius: 8px; box-shadow: var(--shadow-md); padding: 6px; }
.spa-more-pop-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--fg-tertiary); padding: 6px 8px 8px; }
.spa-more-pop-item { display: flex; align-items: center; gap: 8px; padding: 8px 8px; font-size: 13px; color: var(--fg-primary); border-radius: 6px; }
.spa-more-pop-item:hover { background: var(--bg-hover); }

/* Detail field — tight label/value spacing */
.spa-dfield { gap: 3px; }
.spa-dval { padding: 2px 0 0; min-height: auto; align-items: flex-start; }

/* Tier stack (read + edit) — full-width cards stacked vertically (commission tiers) */
.spa-tier-stack { display: flex; flex-direction: column; gap: 0; margin-top: 12px; border: 1px solid var(--border-light); border-radius: 16px; overflow: hidden; background: #fff; }
.spa-tier-stack.compact { max-width: 760px; }
.spa-rebate-layout { display: flex; flex-direction: column; gap: 16px; }
.spa-rebate-layout .hac-detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px 24px; }
.spa-rebate-layout .spa-tier-stack,
.spa-rebate-layout .spa-tier-stack.compact { max-width: 760px; margin-top: 0; }
.spa-rebate-side { min-width: 0; }
.spa-tier-stack-card { display: grid; grid-template-columns: minmax(132px, 0.88fr) minmax(0, 1.04fr) minmax(0, 1.08fr); align-items: center; gap: 18px; border-top: 1px solid var(--border-light); padding: 16px 22px 16px 18px; background: #fff; }
.spa-tier-stack-card:first-child { border-top: none; }
.spa-tier-stack.is-edit .spa-tier-stack-card { grid-template-columns: minmax(132px, 0.88fr) minmax(0, 1.04fr) minmax(0, 1.08fr) auto; }
.spa-tier-stack-id { display: flex; align-items: center; gap: 8px; min-width: 0; }
.spa-tier-stack-field { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.spa-tier-stack-field b { font-size: 13px; font-weight: 600; color: var(--fg-primary); }
.spa-tier-stack-field b,
.spa-tier-body b { white-space: nowrap; }
.spa-tier-stack.is-edit .spa-tier-stack-card > *:last-child { justify-self: end; }
/* shared tier label + final badge (commission stack + rebate cards) */
.spa-tier-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--navy-800); }
.spa-final-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border: 1px solid var(--border-light); border-radius: 999px; background: var(--bg-subtle); color: var(--fg-secondary); }
.spa-tier-stack-field .ml-k,
.spa-tier-body .ml-k { font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 0; flex-shrink: 0; }
.spa-sp-umbrella-card .spa-tier-stack.is-edit .spa-tier-stack-card {
  grid-template-columns: minmax(120px, 0.9fr) minmax(0, 1fr) minmax(0, 1fr) auto;
  gap: 12px;
  padding: 14px 16px;
}
.spa-sp-umbrella-card .spa-tier-stack-field {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 6px;
  align-items: baseline;
}
.spa-sp-umbrella-card .spa-tier-stack-field b {
  min-width: 0;
  white-space: nowrap;
}

.spa-tier-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 320px)); justify-content: start; gap: 12px; margin-top: 12px; }
.spa-tier-card { border: 1px solid var(--border-light); border-radius: 14px; padding: 14px 16px; background: #fff; }
.spa-tier-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.spa-tier-title-wrap { display: flex; align-items: center; gap: 10px; min-width: 0; }
.spa-tier-body { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 12px 16px; align-items: baseline; }
.spa-tier-body > div { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.spa-tier-body b { font-size: 13px; font-weight: 600; color: var(--fg-primary); }

/* Salesperson blocks (read view) */
.spa-sp-list { display: flex; flex-direction: column; gap: 18px; }
.spa-person-card { border: 1px solid var(--border-light); border-radius: 16px; padding: 20px 22px; background: #fff; }
.spa-person-top { display: flex; flex-direction: column; gap: 8px; }
.spa-person-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.spa-person-more { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.spa-sp-name { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 700; color: var(--fg-primary); }
.spa-sp-meta { font-size: 12px; color: var(--fg-secondary); }
.spa-role-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: var(--bg-muted); color: var(--fg-secondary); text-transform: uppercase; letter-spacing: .3px; }
.spa-attr-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; background: var(--bg-subtle); color: var(--fg-secondary); border: 1px solid var(--border-light); white-space: nowrap; }

/* Radios */
.spa-radio-group { display: flex; gap: 28px; flex-wrap: wrap; }
.spa-radio-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--fg-primary); cursor: pointer; }
.spa-radio-row input[type="radio"] { accent-color: var(--green-500); width: 16px; height: 16px; cursor: pointer; }

/* Tier modal */
.spa-tier-modal-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
.spa-tier-modal-row .hac-label { font-weight: 700; color: var(--fg-primary); }

/* Subsidy rows */
.spa-subsidy-rows { display: flex; flex-direction: column; gap: 8px; max-width: 560px; }
.spa-subsidy-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 8px; }
.spa-subsidy-row .hac-input { width: 100%; }
.spa-subsidy-action { display: inline-flex; align-items: center; justify-content: flex-start; min-width: 150px; }

/* Commission validity range readout (form) */
.spa-range-readout { display: flex; align-items: center; gap: 7px; min-height: 38px; padding: 8px 11px; border: 1px dashed var(--border-medium); border-radius: var(--radius-xs); background: #fff; font-size: 13px; font-weight: 600; color: var(--navy-800); }
.spa-label-with-info { display: inline-flex; align-items: center; gap: 6px; }
.spa-info-wrap:focus-within .spa-info-tooltip,
.spa-info-wrap:hover .spa-info-tooltip { opacity: 1; }
.spa-info-trigger { display: inline-flex; align-items: center; justify-content: center; cursor: help; }
.spa-info-tooltip { width: 220px; left: 0; transform: none; }
.spa-info-tooltip::after { left: 14px; transform: none; }

/* Commission Validity — editable months input with suffix */
.spa-validity-input { display: flex; align-items: center; gap: 8px; }
.spa-validity-input .hac-input { width: 110px; }
.spa-validity-suffix { font-size: 13px; color: var(--fg-secondary); }
.spa-inline-readout { min-height: 30px; display: flex; align-items: center; font-size: 13px; font-weight: 600; color: var(--fg-primary); }
.spa-inline-help { margin-top: 4px; font-size: 12px; line-height: 1.35; color: var(--fg-secondary); }

.spa-sp-edit-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }

/* ── Salesperson Setting (per-role commission + volume attribution) ─ */
/* Per-role group */
.spa-role-group { margin-top: 22px; }
.spa-role-group ~ .spa-role-group { padding-top: 20px; border-top: 1px solid var(--border-light); }
.spa-role-group-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.spa-role-group-title { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.spa-role-group-meta { font-size: 12px; color: var(--fg-secondary); }
.spa-role-group-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* Total readout above a full-width distribution bar */
.spa-attr-overview-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; }
.spa-attr-overview-row .spa-attr-total { color: var(--fg-primary); flex-shrink: 0; }
.spa-attr-overview-row .spa-attr-total.warn { color: var(--red-400); }
.spa-attr-overview-row .spa-attr-stack { flex: 1 1 100%; width: 100%; max-width: none; min-width: 0; }

/* Umbrella card: identity + per-agent settings + commission tiering */
.spa-sp-umbrella-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
.spa-sp-umbrella-card { border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px 18px; background: #fff; display: flex; flex-direction: column; }
.spa-umbrella-tiers-label { font-size: 13px; font-weight: 600; color: var(--navy-800); margin-bottom: 10px; }
.spa-tier-meta-row { display: flex; flex-wrap: wrap; gap: 10px 24px; margin-bottom: 12px; }
.spa-tier-meta-item { display: flex; flex-direction: column; gap: 2px; min-width: 160px; }
.spa-tier-meta-item .ml-k { margin-bottom: 0; }
.spa-tier-meta-value { font-size: 13px; font-weight: 600; color: var(--fg-primary); }
.spa-attr-role-title { font-size: 15px; font-weight: 700; color: var(--navy-800); }
.spa-attr-stack { display: flex; gap: 2px; width: 100%; height: 36px; border-radius: var(--radius-sm); overflow: visible; background: var(--bg-muted); }
.spa-attr-stack-seg { position: relative; flex-grow: 0; flex-basis: 0; min-width: 0; display: flex; align-items: center; justify-content: center; background: var(--green-500); overflow: visible; }
.spa-attr-stack-seg.others { background: var(--teal-600); }
.spa-attr-stack-seg:first-child { border-top-left-radius: var(--radius-sm); border-bottom-left-radius: var(--radius-sm); }
.spa-attr-stack-seg:last-child { border-top-right-radius: var(--radius-sm); border-bottom-right-radius: var(--radius-sm); }
.spa-attr-stack-seg:focus-visible { outline: 2px solid rgba(255,255,255,.9); outline-offset: -2px; }
.spa-attr-stack-tip-wrap { position: absolute; inset: 0; display: block; }
.spa-attr-stack-seg:hover .spa-attr-stack-tooltip,
.spa-attr-stack-tip-wrap:hover .spa-attr-stack-tooltip,
.spa-attr-stack-seg:focus-visible .spa-attr-stack-tooltip { opacity: 1; }
.spa-attr-stack-label { position: relative; z-index: 1; font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap; padding: 0 6px; text-shadow: 0 1px 1px rgba(0,0,0,.18); }
.spa-attr-stack-tooltip { width: auto; min-width: 180px; max-width: 260px; white-space: normal; z-index: 60; }
.spa-tier-meta-item .ml-k,
.spa-tier-stack-field .ml-k,
.spa-tier-body .ml-k { font-size: 12px; font-weight: 500; letter-spacing: 0; text-transform: none; color: var(--fg-secondary); }
.spa-attr-list-strong { display: block; font-size: 13px; font-weight: 600; color: var(--navy-800); }
.spa-tier-stack-field b,
.spa-tier-body b,
.spa-tier-meta-value { font-size: 13px; font-weight: 600; color: var(--fg-primary); }
/* Total readout — valid (green) / warn */
.spa-attr-total { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--green-600); }
.spa-attr-total.warn { color: var(--red-400); }
/* Edit modal rows */
.spa-attr-edit-group { display: flex; flex-direction: column; gap: 12px; }
.spa-attr-edit-group + .spa-attr-edit-group { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--border-light); }
.spa-attr-edit-group-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.spa-attr-edit-list { display: flex; flex-direction: column; gap: 10px; }
.spa-attr-edit-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 12px 14px; }
.spa-attr-edit-person { min-width: 0; }
.spa-attr-edit-input { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.spa-attr-edit-input .hac-input { width: 84px; text-align: right; }
.spa-attr-pct { font-size: 13px; font-weight: 600; color: var(--fg-secondary); }
.spa-attr-modal-foot-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 16px; flex-wrap: wrap; }

/* ── Responsive ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .ml-app { grid-template-columns: 1fr; }
  .ml-sidebar { display: none !important; }
  .ml-main { grid-column: 1; grid-row: 2; padding: 14px 14px 48px; }
  .ml-h1 { font-size: 20px; }
  .spa-tier-stack-card { grid-template-columns: 1fr 1fr; gap: 10px 16px; position: relative; }
  .spa-tier-stack-id { grid-column: 1 / -1; }
  .spa-tier-stack.is-edit .spa-tier-stack-card { grid-template-columns: 1fr 1fr; padding-right: 38px; }
  .spa-sp-umbrella-card .spa-tier-stack-field { display: flex; }
  .spa-tier-stack.is-edit .spa-tier-stack-card > *:last-child { position: absolute; top: 12px; right: 14px; }
  .spa-tier-grid { grid-template-columns: 1fr; }
  .spa-tier-body { grid-template-columns: 1fr; }
  .spa-subsidy-row { grid-template-columns: 1fr; }
  .spa-subsidy-action { min-width: 0; }
  .spa-sp-umbrella-grid { grid-template-columns: 1fr; }
  .spa-attr-overview-row .spa-attr-stack { max-width: none; }
  .spa-attr-edit-group-head { align-items: stretch; }
  .spa-rebate-layout .hac-detail-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .ml-library-link span { display: none; }
  .ml-library-link { padding: 8px; }
}
</style>
</head>
<body>
