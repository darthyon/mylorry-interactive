<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyTrip — Live Fleet Map (test) · Org Portal</title>
<link rel="stylesheet" href="../../styles/tokens.css">
<link rel="stylesheet" href="../../styles/components.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:13px;color:var(--fg-primary);background:#fff;}
.msr{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}

/* ── Shell (icon nav rail + app) — mirrors the MyTrip module shell ─ */
.mtm-shell{display:grid;grid-template-columns:72px 1fr;height:100vh;background:#fff;}
.mt-rail-wrap{position:sticky;top:0;align-self:start;height:100vh;z-index:25;}
.mt-rail{height:100%;background:#fff;border-right:1px solid var(--border-light);display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 6px;overflow-y:auto;width:72px;transition:width .18s ease,box-shadow .18s ease;}
.mt-rail::-webkit-scrollbar{width:0;}
.mt-rail.expanded{width:220px;align-items:stretch;box-shadow:4px 0 16px rgba(0,0,0,.08);}
.mt-rail-profile{display:flex;align-items:center;gap:4px;margin-bottom:12px;padding:6px 4px;border-radius:10px;}
.mt-rail.expanded .mt-rail-profile{flex-direction:row;align-items:center;gap:10px;}
.mt-rail-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mt-rail-avatar{width:32px;height:32px;border-radius:50%;background:rgb(223,234,239);display:flex;align-items:center;justify-content:center;}
.mt-rail-badge{border-radius:12px;background:var(--gradient-brand);padding:1px 5px;font-size:6px;font-weight:700;color:#fff;line-height:1.6;letter-spacing:0.5px;text-transform:uppercase;}
.mt-rail-profile-text{display:flex;flex-direction:column;gap:2px;overflow:hidden;min-width:0;}
.mt-rail-profile-role{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--fg-tertiary);white-space:nowrap;}
.mt-rail-profile-name{font-size:14px;font-weight:600;color:var(--fg-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mt-rail-item{width:60px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:10px;cursor:pointer;color:var(--fg-tertiary);flex-shrink:0;text-decoration:none;padding:6px 2px;border:none;background:transparent;font-family:inherit;}
.mt-rail-item span:not(.msr){font-size:8.5px;text-align:center;line-height:1.15;max-width:100%;}
.mt-rail-item:hover{background:var(--bg-muted);color:var(--fg-secondary);}
.mt-rail-item.active{background:var(--green-50);color:var(--green-600);}
.mt-rail.expanded .mt-rail-item{flex-direction:row;justify-content:flex-start;width:100%;padding:10px 8px;gap:10px;}
.mt-rail.expanded .mt-rail-item span:not(.msr){font-size:13px;text-align:left;max-width:none;}
.mt-rail-divider{background:#f6f6f6;height:1px;width:100%;margin:8px 0;flex-shrink:0;}
.mt-rail-footer{display:flex;flex-direction:column;gap:2px;width:100%;margin-top:auto;flex-shrink:0;}
.mt-rail-signout{color:#D55F5A;}
.mt-rail-toggle{position:absolute;top:34px;left:57px;width:28px;height:28px;border-radius:8px;background:#fff;border:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:26;box-shadow:0 2px 6px rgba(0,0,0,.06);color:var(--fg-secondary);transition:left .18s ease;}
.mt-rail-wrap.expanded .mt-rail-toggle{left:205px;}

/* ── App frame ─────────────────────────────────────────────────── */
.mtm-app{display:flex;flex-direction:column;height:100vh;min-width:0;background:#fff;}
.mtm-topbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--border-light);z-index:30;}
.mtm-topbar-title{font-size:14px;font-weight:600;color:var(--fg-primary);display:flex;align-items:center;gap:8px;}
.mtm-topbar-tag{font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--amber-600);background:var(--amber-50);border:1px solid var(--amber-500);border-radius:5px;padding:1px 5px;}
.mtm-topbar-spacer{flex:1;}
.mtm-topbar-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--fg-secondary);font:600 12.5px var(--font-sans);border:1px solid var(--border-light);border-radius:8px;padding:7px 12px;background:#fff;}
.mtm-topbar-link:hover{background:var(--bg-muted);color:var(--fg-primary);}

.mtm-body{flex:1;min-height:0;position:relative;}

/* ── Floating panel: stats + selector (overlays the map) ───────── */
.mtm-panel{position:absolute;top:16px;left:16px;z-index:500;width:320px;max-height:calc(100% - 32px);overflow-y:auto;background:transparent;display:flex;flex-direction:column;gap:12px;padding-bottom:4px;}
.mtm-panel::-webkit-scrollbar{width:0;}
.mtm-panel-head{margin-bottom:10px;padding:0 2px;}
.mtm-panel-title{font-size:16px;font-weight:600;color:var(--fg-primary);}
.mtm-panel-sub{margin-top:3px;font-size:11.5px;color:var(--fg-tertiary);}
/* Floating cards — same chrome as the bottom strip */
.mtm-pcard{background:#fff;border:1px solid var(--border-light);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.06);}
.mtm-pcard-kpis{padding:12px;}
.mtm-pcard-list{padding:8px 8px 10px;}
.mtm-kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mtm-chip{display:flex;align-items:center;gap:7px;border:1px solid var(--border-light);border-radius:10px;padding:8px 10px;background:var(--bg-subtle);}
.mtm-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mtm-chip-num{font-size:15px;font-weight:700;color:var(--fg-primary);font-variant-numeric:tabular-nums;}
.mtm-chip-label{font-size:11px;color:var(--fg-secondary);}

.mtm-search-box{display:flex;align-items:center;gap:7px;border:1px solid var(--border-medium);border-radius:8px;padding:0 10px;margin-bottom:10px;background:#fff;}
.mtm-search-box input{border:none;outline:none;background:transparent;font:13px var(--font-sans);color:var(--fg-primary);padding:9px 0;width:100%;}
.mtm-search-box input::placeholder{color:var(--fg-tertiary);}
.mtm-search-box:focus-within{border-color:var(--green-500);box-shadow:0 0 5px rgba(0,0,0,.08);}
.mtm-search-clear{border:none;background:transparent;padding:2px;display:flex;color:var(--fg-tertiary);cursor:pointer;border-radius:50%;flex-shrink:0;}
.mtm-search-clear:hover{background:var(--bg-muted);color:var(--fg-primary);}

.mtm-sections{display:flex;flex-direction:column;gap:6px;}
.mtm-sec-head{width:100%;display:flex;align-items:center;gap:6px;border:none;background:transparent;padding:8px 4px;cursor:pointer;font-family:inherit;color:var(--fg-secondary);border-radius:8px;}
.mtm-sec-head:hover{background:var(--bg-subtle);}
.mtm-sec-label{font-size:12px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--fg-tertiary);}
.mtm-sec-count{margin-left:auto;font-size:11.5px;font-weight:700;color:var(--fg-secondary);background:var(--bg-muted);border-radius:999px;min-width:20px;text-align:center;padding:1px 7px;font-variant-numeric:tabular-nums;}
.mtm-sec-list{display:flex;flex-direction:column;gap:2px;padding:2px 0 6px;}
.mtm-sec-empty{font-size:11.5px;color:var(--fg-tertiary);padding:4px 10px 8px;}

.mtm-row{display:flex;align-items:center;gap:10px;width:100%;border:1px solid transparent;background:transparent;border-radius:10px;padding:9px 10px;cursor:pointer;font-family:inherit;text-align:left;transition:background .12s,border-color .12s;}
.mtm-row:hover{background:var(--bg-subtle);}
.mtm-row.active{background:var(--green-50);border-color:var(--green-200);}
.mtm-row-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mtm-row-main{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
.mtm-row-plate{font-size:13px;font-weight:700;color:var(--fg-primary);white-space:nowrap;}
.mtm-row-driver{font-size:11px;color:var(--fg-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mtm-row-prog{font-size:11.5px;font-weight:600;color:var(--fg-secondary);font-variant-numeric:tabular-nums;flex-shrink:0;}

/* ── Map (fills the body; panel + strip float over it) ─────────── */
.mtm-map{position:absolute;inset:0;height:100%;width:100%;background:#E5EEF2;z-index:1;}
.mtm-map-fallback{display:flex;align-items:center;justify-content:center;color:var(--fg-tertiary);font-size:13px;}
.leaflet-container{font-family:var(--font-sans);}

/* ── Leaflet control chrome → design-system styling ────────────── */
.leaflet-control-zoom.leaflet-bar{border:1px solid var(--border-light);border-radius:10px;box-shadow:0 3px 12px rgba(0,0,0,.12);overflow:hidden;}
.leaflet-control-zoom a{width:34px;height:34px;line-height:34px;color:var(--fg-secondary);background:#fff;font-size:18px;font-weight:500;border:none;transition:background .12s,color .12s;}
.leaflet-control-zoom a:first-child{border-bottom:1px solid var(--border-light);}
.leaflet-control-zoom a:hover{background:var(--green-50);color:var(--green-600);}
.leaflet-control-zoom a.leaflet-disabled{color:var(--border-medium);background:var(--bg-subtle);}
.leaflet-touch .leaflet-bar a{border-radius:0;}
.leaflet-bar a:focus-visible{outline:none;box-shadow:inset 0 0 0 2px var(--green-500);}
.leaflet-control-attribution{background:rgba(255,255,255,.82);backdrop-filter:blur(4px);border-radius:8px 0 0 0;padding:2px 8px;font-size:10px;color:var(--fg-tertiary);}
.leaflet-control-attribution a{color:var(--fg-secondary);}
.leaflet-control-zoom{margin:14px 14px 0 0;}

/* Custom pins (divIcon) */
.mtm-di{background:none;border:none;}
.mtm-pin{display:block;width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);}
.mtm-pin-done{background:var(--green-500);}
.mtm-pin-pending{background:#9AA7AE;}
.mtm-pin-truck{width:34px;height:34px;border-radius:50%;background:var(--green-600);color:#fff;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,170,79,.5);}
.mtm-pin-truck .msr{font-size:19px;}

/* ── Summary callout (anchored to the truck pin) ───────────────── */
.mtm-callout{position:absolute;z-index:500;width:264px;background:#fff;border:1px solid var(--border-light);border-radius:12px;padding:12px 14px;box-shadow:0 8px 28px rgba(0,0,0,.18);transform:translate(18px,-50%);transition:opacity .12s;}
.mtm-callout.flip{transform:translate(calc(-100% - 18px),-50%);}
.mtm-callout::before{content:"";position:absolute;top:50%;left:-6px;width:11px;height:11px;background:#fff;border-left:1px solid var(--border-light);border-bottom:1px solid var(--border-light);transform:translateY(-50%) rotate(45deg);}
.mtm-callout.flip::before{left:auto;right:-6px;border-left:none;border-bottom:none;border-right:1px solid var(--border-light);border-top:1px solid var(--border-light);}
.mtm-callout-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.mtm-callout-state{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mtm-callout-plate{font-size:14px;font-weight:700;color:var(--fg-primary);}
.mtm-callout-tag{margin-left:auto;font-size:10px;font-weight:600;color:var(--fg-tertiary);white-space:nowrap;}
.mtm-callout-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:11px;}
.mtm-callout-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--fg-secondary);min-width:0;}
.mtm-callout-row .msr{color:var(--fg-tertiary);flex-shrink:0;}
.mtm-callout-val{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mtm-callout-btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border-medium);background:#fff;border-radius:8px;padding:8px 12px;font:600 12.5px var(--font-sans);color:var(--fg-primary);cursor:pointer;}
.mtm-callout-btn:hover{background:var(--bg-muted);}

/* ── Right waypoint drawer ─────────────────────────────────────── */
.mtm-drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;justify-content:flex-end;}
.mtm-drawer{width:100%;max-width:420px;height:100%;background:#fff;box-shadow:-8px 0 32px rgba(0,0,0,.18);display:flex;flex-direction:column;animation:mtm-slide .2s ease;}
@keyframes mtm-slide{from{transform:translateX(24px);opacity:.6;}to{transform:translateX(0);opacity:1;}}
.mtm-drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:18px 18px 12px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.mtm-drawer-plate{font-size:17px;font-weight:700;color:var(--fg-primary);}
.mtm-drawer-route{margin-top:3px;font-size:12px;color:var(--fg-secondary);}
.mtm-drawer-close{border:none;background:var(--bg-muted);border-radius:8px;padding:6px;cursor:pointer;color:var(--fg-secondary);display:flex;flex-shrink:0;}
.mtm-drawer-close:hover{background:var(--bg-hover);color:var(--fg-primary);}
.mtm-drawer-body{flex:1;overflow-y:auto;padding:16px 18px 24px;}

.mtm-drawer-meta{display:flex;flex-direction:column;gap:6px;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border-light);}
.mtm-drawer-meta span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--fg-secondary);min-width:0;}
.mtm-drawer-meta .msr{color:var(--fg-tertiary);flex-shrink:0;}
.mtm-meta-val{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Trip overview card */
.mtm-trip-card{background:var(--bg-subtle);border-radius:14px;padding:14px 16px;margin-bottom:18px;}
.mtm-trip-card-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--navy-800);margin-bottom:10px;}
.mtm-trip-stat-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:12.5px;}
.mtm-trip-stat-grid span{color:var(--fg-secondary);}
.mtm-trip-stat-grid b{color:var(--fg-primary);font-weight:700;text-align:right;}
.mtm-trip-metrics{display:flex;justify-content:center;gap:36px;margin-top:16px;}
.mtm-metric{display:flex;flex-direction:column;align-items:center;gap:5px;}
.mtm-metric-circle{width:36px;height:36px;border-radius:50%;background:var(--navy-800);color:#fff;display:flex;align-items:center;justify-content:center;}
.mtm-metric-circle.good{background:var(--green-600);}
.mtm-metric-val{font-size:15px;font-weight:700;color:var(--fg-primary);}
.mtm-metric-label{font-size:11px;color:var(--fg-tertiary);}

.mtm-progress-title{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--fg-tertiary);margin-bottom:12px;}
.mtm-progress-title .msr{text-transform:none;}
.mtm-wps{display:flex;flex-direction:column;}
.mtm-wp{display:flex;gap:12px;}
.mtm-wp-rail{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0;}
.mtm-wp-node{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--border-medium);color:#fff;}
.mtm-wp-node-done{background:var(--green-500);box-shadow:0 0 0 1.5px var(--green-500);}
.mtm-wp-node-pending{background:#fff;box-shadow:0 0 0 1.5px var(--border-medium);}
.mtm-wp-node-pin{background:var(--green-600);box-shadow:0 0 0 1.5px var(--green-600);width:26px;height:26px;}
.mtm-wp-line{width:2px;flex:1;background:var(--border-light);min-height:18px;}
.mtm-wp-copy{display:block;width:100%;border:none;background:transparent;padding:0 0 18px;margin:0;min-width:0;text-align:left;font-family:inherit;cursor:pointer;}
.mtm-wp-toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.mtm-wp-label{font-size:13px;font-weight:600;color:var(--fg-primary);}
.mtm-wp-badge{flex-shrink:0;font-size:10px;font-weight:700;border-radius:999px;padding:2px 9px;white-space:nowrap;}
.mtm-wp-badge-completed{background:var(--green-50);color:var(--green-700);}
.mtm-wp-badge-ongoing{background:#E7F0FF;color:var(--navy-800);}
.mtm-wp-badge-upcoming{background:var(--bg-muted);color:var(--fg-tertiary);}
.mtm-wp-times{display:flex;gap:18px;margin-top:8px;}
.mtm-wp-times span{display:flex;flex-direction:column;gap:2px;}
.mtm-wp-times i{font-style:normal;font-size:10.5px;color:var(--fg-tertiary);}
.mtm-wp-times b{font-size:11.5px;font-weight:700;color:var(--fg-secondary);}
.mtm-wp-expand{display:flex;align-items:center;gap:6px;margin-top:9px;padding:8px 10px;background:var(--bg-subtle);border-radius:8px;font-size:11.5px;color:var(--fg-secondary);}
.mtm-wp-expand .msr{color:var(--fg-tertiary);flex-shrink:0;}

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width:860px){
  .mtm-shell{grid-template-columns:1fr;}
  .mt-rail-wrap{position:fixed;left:50%;bottom:16px;top:auto;transform:translateX(-50%);height:auto;z-index:60;}
  .mt-rail,.mt-rail.expanded{width:auto;height:auto;flex-direction:row;gap:4px;padding:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--border-light);border-radius:999px;box-shadow:0 8px 28px rgba(0,0,0,.16);align-items:center;}
  .mt-rail-profile,.mt-rail-toggle,.mt-rail-divider,.mt-rail-footer{display:none;}
  .mt-rail-item,.mt-rail.expanded .mt-rail-item{min-height:auto;width:auto;flex-direction:row;gap:6px;padding:9px 14px;border-radius:999px;}
  .mt-rail-item span:not(.msr),.mt-rail.expanded .mt-rail-item span:not(.msr){font-size:11px;}
  .mt-rail-item:not(.active) span:not(.msr){display:none;}
  .mtm-panel{left:12px;right:12px;width:auto;max-height:40vh;}
  .mtm-drawer{max-width:100%;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="../../shared/shared-shell.js?v=20260715a"></script>
<script src="data.js?v=20260721c"></script>
<script src="app.js?v=20260721c"></script>
