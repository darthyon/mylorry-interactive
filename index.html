<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyLorry — Prototype Library</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
<style>
/* ── Reset ──────────────────────────────────────────────────── */
html,body{height:100%;margin:0;padding:0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:var(--font-sans);font-size:14px;color:var(--fg-primary);background:#fff;}
.ms{font-family:'Material Symbols Rounded';font-style:normal;font-weight:400;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20;line-height:1;vertical-align:middle;user-select:none;display:inline-flex;align-items:center;}

/* ── Shell ──────────────────────────────────────────────────── */
.shell{min-height:100vh;display:flex;flex-direction:column;}
.topbar{height:64px;background:var(--gradient-brand);display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:10;}
.topbar-logo{width:42px;height:24px;overflow:hidden;display:flex;align-items:center;flex-shrink:0;}
.topbar-logo img{height:24px;width:auto;filter:brightness(0) invert(1);opacity:0.95;display:block;flex-shrink:0;}
.topbar-title{margin-left:12px;font-size:16px;font-weight:600;color:#fff;opacity:0.85;letter-spacing:0.3px;}

.content{flex:1;display:grid;grid-template-columns:1fr 280px;gap:0;max-width:1400px;width:100%;margin:0 auto;}
.main{padding:48px 40px 80px;}

/* ── Page Header ─────────────────────────────────────────────── */
.page-hdr{margin-bottom:40px;}
.page-hdr h1{font-size:28px;font-weight:700;color:var(--fg-primary);margin:0 0 8px;letter-spacing:-0.5px;}
.page-hdr p{font-size:15px;color:var(--fg-secondary);margin:0 0 24px;}
.search-bar{position:relative;max-width:400px;}
.search-bar .ms{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-tertiary);font-size:18px;}
.search-bar input{width:100%;height:44px;padding:0 14px 0 42px;border:1px solid var(--border-light);border-radius:var(--radius-md);font-size:15px;font-family:var(--font-sans);outline:none;transition:border-color 0.15s,box-shadow 0.15s;background:#fff;}
.search-bar input:focus{border-color:var(--green-500);box-shadow:0 0 0 3px rgba(0,170,79,0.08);}
.search-bar input::placeholder{color:var(--fg-tertiary);}

/* ── Quick links ─────────────────────────────────────────────── */
.quick-links{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;}
.quick-link{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border-light);border-radius:var(--radius-md);text-decoration:none;color:var(--fg-primary);font-weight:600;font-size:14px;background:#fff;transition:all .15s;}
.quick-link:hover{border-color:var(--green-500);background:var(--green-50);}
.quick-link .ms{color:var(--green-600);font-size:18px;}

/* ── TOC Section ───────────────────────────────────────────── */
.toc-section{margin-bottom:56px;scroll-margin-top:80px;}
.toc-hdr{padding:0 0 12px 0;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.toc-hdr .ms{font-size:20px;background:var(--gradient-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.toc-hdr h2{font-size:14px;font-weight:600;color:var(--fg-primary);margin:0;flex:1;text-transform:uppercase;letter-spacing:0.5px;}
.toc-hdr .count{font-size:13px;font-weight:500;color:var(--fg-tertiary);}
.toc-list{display:flex;flex-direction:column;gap:12px;}

/* ── TOC Item ──────────────────────────────────────────────── */
.toc-flow-card{border:1px solid var(--border-light);border-radius:var(--radius-md);background:#fff;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,0.04);}
.toc-item{display:flex;align-items:center;gap:14px;padding:16px;border:none;transition:background 0.15s;text-decoration:none;color:inherit;scroll-margin-top:80px;}
.toc-item:hover{background:var(--bg-hover);}
.toc-ico{width:32px;height:32px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toc-ico .ms{font-size:18px;}
.toc-ico[data-status="ready"]{background:var(--green-50);}
.toc-ico[data-status="ready"] .ms{color:var(--green-500);}
.toc-ico[data-status="wip"]{background:var(--amber-50);}
.toc-ico[data-status="wip"] .ms{color:var(--amber-500);}
.toc-ico[data-status="planned"]{background:var(--bg-muted);}
.toc-ico[data-status="planned"] .ms{color:var(--fg-tertiary);}
.toc-body{flex:1;min-width:0;}
.toc-title{font-size:14px;font-weight:500;color:var(--fg-primary);}
.toc-item[data-status="ready"] .toc-title{font-weight:600;}
.toc-item[data-status="planned"] .toc-title{color:var(--fg-tertiary);}
.toc-desc{font-size:13px;color:var(--fg-secondary);margin-top:3px;line-height:1.5;}
.toc-meta{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.toc-dot{width:8px;height:8px;border-radius:50%;}
.toc-dot[data-status="ready"]{background:var(--green-500);}
.toc-dot[data-status="wip"]{background:var(--amber-500);}
.toc-dot[data-status="planned"]{background:var(--border-light);}
.btn-view{font-size:12px;font-weight:600;color:var(--green-600);background:var(--green-50);padding:4px 10px;border-radius:4px;border:1px solid var(--green-500);text-decoration:none;transition:all 0.1s;white-space:nowrap;}
.btn-view:hover{background:var(--green-600);color:#fff;}
.toc-item:focus-visible{outline:2px solid var(--green-500);outline-offset:-2px;}

/* ── Screen review notes (under a ready flow) ────────────────── */
.toc-screens{list-style:none;margin:0;padding:4px 16px 16px 62px;display:flex;flex-direction:column;gap:9px;}
.toc-screen{display:flex;gap:10px;font-size:13px;line-height:1.5;}
.sn-num{color:var(--fg-tertiary);font-weight:700;flex-shrink:0;min-width:14px;}
.sn-label{color:var(--fg-primary);font-weight:600;}
.sn-note{color:var(--fg-secondary);}
.toc-accordion{border-top:1px solid var(--border-light);background:linear-gradient(180deg,#fcfefd 0%,#f7fbf8 100%);}
.toc-accordion summary{display:flex;align-items:center;gap:8px;padding:12px 16px 12px 62px;list-style:none;cursor:pointer;color:var(--green-600);font-size:12px;font-weight:700;user-select:none;}
.toc-accordion summary::-webkit-details-marker{display:none;}
.toc-accordion summary .ms{font-size:16px;transition:transform .15s ease;}
.toc-accordion[open] summary .ms{transform:rotate(90deg);}
.toc-accordion .toc-screens{margin:0;border-bottom:none;padding-top:0;}

/* ── Empty state ───────────────────────────────────────────── */
.empty-state{text-align:center;padding:48px 20px;color:var(--fg-secondary);font-size:15px;}
.empty-state .ms{font-size:32px;color:var(--fg-tertiary);margin-bottom:12px;display:block;}

/* ── Sidebar / Jump index ──────────────────────────────────── */
.sidebar{border-left:1px solid var(--border-light);padding:48px 24px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
.sidebar-hdr{margin-bottom:16px;}
.sidebar-hdr h3{font-size:14px;font-weight:600;color:var(--fg-primary);margin:0;text-transform:uppercase;letter-spacing:0.5px;}
.sidebar-hdr p{font-size:13px;color:var(--fg-secondary);margin:6px 0 0;}
.jump-list{display:flex;flex-direction:column;gap:2px;margin-bottom:32px;}
.jump-group{font-size:11px;font-weight:700;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;}
.jump-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--fg-primary);text-decoration:none;transition:background .12s;}
.jump-item:hover{background:var(--bg-hover);}
.jump-item .jdot{width:7px;height:7px;border-radius:50%;background:var(--green-500);flex-shrink:0;}

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 960px){
  .content{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .main{padding:32px 24px 60px;}
}
@media (max-width: 640px){
  .main{padding:32px 16px 60px;}
  .page-hdr h1{font-size:24px;}
  .toc-screens{padding-left:46px;}
  .toc-accordion summary{padding-left:46px;}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-logo">
      <img src="flows/fleet-card/img_logo_white.svg" alt="MyLorry" />
    </div>
    <span class="topbar-title">Prototype Library</span>
  </header>

  <div class="content">
    <main class="main">
      <div class="page-hdr">
        <h1>Prototype Library</h1>
        <div class="search-bar">
          <span class="ms">search</span>
          <input type="text" placeholder="Search flows by name..." id="searchInput" />
        </div>
        <nav class="quick-links" id="quickLinks"></nav>
      </div>

      <div id="portals"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <span class="ms">search_off</span>
        No flows match your search.
      </div>
    </main>

    <aside class="sidebar">
      <div class="sidebar-hdr">
        <h3>Jump to</h3>
        <p>Ready flows for review</p>
      </div>
      <nav class="jump-list" id="jumpList"></nav>
    </aside>
  </div>
</div>

<script src="flows.js"></script>
<script>
(function () {
  const M = window.FLOWS;
  const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));

  // Quick links (Design System, etc.)
  document.getElementById('quickLinks').innerHTML = (M.links || []).map(l =>
    `<a class="quick-link" href="${esc(l.route)}"><span class="ms">${esc(l.icon || 'arrow_forward')}</span>${esc(l.name)}</a>`
  ).join('');

  // Portals + flows
  const portalsHtml = M.portals.map(portal => {
    const readyCount = portal.flows.filter(f => f.status === 'ready').length;
      const items = portal.flows.map(flow => {
      const ready = flow.status === 'ready';
      const head = ready
        ? `<a class="toc-item" id="flow-${esc(flow.id)}" data-status="ready" data-title="${esc(flow.name)}" href="${esc(flow.route)}">
             <div class="toc-ico" data-status="ready"><span class="ms">check_circle</span></div>
             <div class="toc-body">
               <div class="toc-title">${esc(flow.name)}</div>
               ${flow.desc ? `<div class="toc-desc">${esc(flow.desc)}</div>` : ''}
             </div>
             <div class="toc-meta"><span class="toc-dot" data-status="ready"></span><span class="btn-view">View</span></div>
           </a>`
        : `<div class="toc-item" data-status="${esc(flow.status)}" data-title="${esc(flow.name)}">
             <div class="toc-ico" data-status="${esc(flow.status)}"><span class="ms">${flow.status === 'wip' ? 'pending' : 'folder'}</span></div>
             <div class="toc-body"><div class="toc-title">${esc(flow.name)}</div></div>
             <div class="toc-meta"><span class="toc-dot" data-status="${esc(flow.status)}"></span></div>
           </div>`;
      const screens = (ready && flow.screens && flow.screens.length)
        ? `<details class="toc-accordion">
            <summary><span class="ms">chevron_right</span>Prototype Flow Details</summary>
            <ul class="toc-screens" data-screens-for="${esc(flow.name)}">` + flow.screens.map((s, i) =>
              `<li class="toc-screen"><span class="sn-num">${i + 1}</span><span><span class="sn-label">${esc(s.label)}</span>${s.note ? ` — <span class="sn-note">${esc(s.note)}</span>` : ''}</span></li>`
            ).join('') + `</ul>
          </details>`
        : '';
      return `<div class="toc-flow-card">${head}${screens}</div>`;
    }).join('');

    return `<section class="toc-section" id="${esc(portal.id)}">
      <div class="toc-hdr"><span class="ms">${esc(portal.icon)}</span><h2>${esc(portal.name)}</h2><span class="count">${readyCount} ready</span></div>
      <div class="toc-list">${items}</div>
    </section>`;
  }).join('');
  document.getElementById('portals').innerHTML = portalsHtml;

  // Jump index — ready flows grouped by portal
  document.getElementById('jumpList').innerHTML = M.portals.map(portal => {
    const ready = portal.flows.filter(f => f.status === 'ready');
    if (!ready.length) return '';
    return `<div class="jump-group">${esc(portal.name)}</div>` + ready.map(f =>
      `<a class="jump-item" href="#flow-${esc(f.id)}"><span class="jdot"></span>${esc(f.name)}</a>`
    ).join('');
  }).join('');

  // Search — filter rows + their screen notes; hide empty sections
  const input = document.getElementById('searchInput');
  const empty = document.getElementById('emptyState');
  input.addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();
    let anyVisible = false;
    document.querySelectorAll('.toc-section').forEach(section => {
      let sectionVisible = false;
      section.querySelectorAll('.toc-flow-card').forEach(card => {
        const item = card.querySelector('.toc-item');
        const title = (item.dataset.title || '').toLowerCase();
        const match = q === '' || title.includes(q);
        card.style.display = match ? '' : 'none';
        const screens = item.nextElementSibling;
        if (screens && screens.classList.contains('toc-accordion')) {
          screens.style.display = match ? '' : 'none';
        }
        if (match) { sectionVisible = true; anyVisible = true; }
      });
      section.style.display = sectionVisible ? '' : 'none';
    });
    empty.style.display = anyVisible ? 'none' : '';
  });
})();
</script>
</body>
</html>
